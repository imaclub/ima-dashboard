      .catch(e=>{console.error('Google Places error:',e);setGoogleLoading(false);});
  },[]);

  // Filtrer les factures à la même période que le CA Trivec
  const seasonInvoices=useMemo(()=>{
    if(!hasSeason)return[];
    const _sp=TRIVEC_SEASON.periode;
    const from=_sp.from.split('/').reverse().join('-');
    const to=_sp.to.split('/').reverse().join('-');
    return allInvoices.filter(inv=>inv.date&&inv.date>=from&&inv.date<=to);
  },[allInvoices,hasSeason]);

  // Calculate KPIs
  const s=hasSeason?TRIVEC_SEASON:null;
  const bp=BP_DATA;

  // Row 1: CA, Food Cost %, Prime Cost %, EBITDA
  const caSaison=s?s.ventesNet:0;
  const caEcart=bp.annual.caTotal>0?Math.round((caSaison-bp.annual.caTotal)/bp.annual.caTotal*1000)/10:0;

  const supplierTotals=useMemo(()=>SupplierMap.getTotals(seasonInvoices),[seasonInvoices]);
  // Achats bruts
  const foodAchatsHT=supplierTotals['Food']||0;
  const barAchatsHT=supplierTotals['Bar']||0;
  // Consommation = Achats - Stock Clôture (formule standard)
  const foodCostHT=Math.max(0,foodAchatsHT-STOCK_VALUE_0103.food);
  const barCostHT=Math.max(0,barAchatsHT-STOCK_VALUE_0103.bar);
  const caNourritureHT=s?s.categories.find(c=>c.nom==='Nourriture').montant/1.10:0;
  const foodCostPct=caNourritureHT>0?Math.round(foodCostHT/caNourritureHT*1000)/10:0;

  const caBoissonsTTC=s?s.categories.find(c=>c.nom==='Boissons Alcoolisées').montant:0;
  const caBoissonAlcHT=caBoissonsTTC/1.20;
  const msCost=PayrollService.getMasseSalarialeActive();
  const primeCostPct=caSaison>0?Math.round((foodCostHT+barCostHT+msCost)/caSaison*1000)/10:0;

  const cogsTotal=foodCostHT+barCostHT;
  // OPEX = TOUTES les charges fournisseurs sauf Food, Bar, Staff et Hors Exploitation
  // On inclut "Non classé" car c'est très probablement de l'opex non encore catégorisé
  const excludeFromOpex=['Food','Bar','Staff','Compte courant associé','Investissements'];
  const opexTotal=Object.entries(supplierTotals).reduce((s,[cat,val])=>{
    if(excludeFromOpex.includes(cat))return s;
    return s+(val||0);
  },0);
  const ebitdaEst=caSaison-cogsTotal-msCost-opexTotal;

  // Row 2: Ticket Moyen (CA Nourriture / couverts), Couverts, Staff Cost %, Google Rating
  const caNourritureTTC_dash=s?s.categories.find(c=>c.nom==='Nourriture').montant:0;
  const tmoyenne=s&&s.couverts>0?Math.round(caNourritureTTC_dash/s.couverts):0;
  const couverts=s?s.couverts:0;
  const staffCostPct=caSaison>0?Math.round(msCost/caSaison*1000)/10:0;
  const gRating=googleRating?.rating||null;

  return(<div className="fin">
    {!hasSeason&&<div style={{background:'var(--bleu-light)',border:'1px solid var(--bleu)',borderRadius:10,padding:16,marginBottom:20,fontSize:13,color:'var(--bleu)'}}>
      <strong>Tableau de bord saison 2025-2026.</strong> Les données Trivec, Pennylane et Google Places apparaissent ici lorsque configurées dans <strong>Administration</strong>.
    </div>}

    {/* Row 1: CA, Food Cost %, Prime Cost %, EBITDA */}
    <div className="kpi-g">
      <div className="kpi">
        <div className="kpi-label">CA Saison</div>
        <div className="kpi-val">{eur(caSaison)}</div>
        <div className={`kpi-chg ${caEcart>=0?'pos':'neg'}`}>{caEcart>=0?'+':''}{caEcart}% vs BP</div>
      </div>
      <div className="kpi">
        <div className="kpi-label">Food Cost %</div>
        <div className="kpi-val" style={{color:foodCostPct>35?'var(--rouge)':foodCostPct>30?'var(--orange)':'var(--vert)'}}>{foodCostPct}%</div>
        <div className="text-muted" style={{marginTop:6}}>{eur(foodCostHT)} / {eur(caNourritureHT)}</div>
        {STOCK_VALUE_0103.food>0&&<div className="text-muted" style={{fontSize:9,marginTop:2}}>Achats {eur(foodAchatsHT)} − Stock {eur(STOCK_VALUE_0103.food)}</div>}
      </div>
      <div className="kpi">
        <div className="kpi-label">Prime Cost %</div>
        <div className="kpi-val" style={{color:primeCostPct>60?'var(--rouge)':primeCostPct>55?'var(--orange)':'var(--vert)'}}>{primeCostPct}%</div>
        <div className="text-muted" style={{marginTop:6}}>Food+Bar+Staff</div>
      </div>
      <div className="kpi">
        <div className="kpi-label">EBITDA Estimé</div>
        <div className="kpi-val" style={{color:ebitdaEst>0?'var(--vert)':'var(--rouge)'}}>{eur(ebitdaEst)}</div>
        <div className={`kpi-chg ${ebitdaEst>0?'pos':'neg'}`}>{caSaison>0?(ebitdaEst/caSaison*100).toFixed(1):0}% de marge</div>
        {opexTotal>0&&<div style={{fontSize:9,color:'var(--gris-400)',marginTop:2}}>CA − COGS − Staff − Opex {eur(opexTotal)}</div>}
      </div>
    </div>

    {/* Row 2: Ticket Moyen, Couverts, Staff Cost %, Google Rating */}
    <div className="kpi-g">
      <div className="kpi">
        <div className="kpi-label">Ticket Moyen Resto</div>
        <div className="kpi-val">{tmoyenne}€</div>
        <div className="text-muted" style={{marginTop:6}}>{eur(caNourritureTTC_dash)} / {couverts} couverts</div>
        <div style={{fontSize:9,color:'var(--gris-400)',marginTop:2}}>Food uniquement (hors boissons à table)</div>
      </div>
      <div className="kpi">
        <div className="kpi-label">Couverts Saison</div>
        <div className="kpi-val">{fmt(couverts)}</div>
        <div className="text-muted" style={{marginTop:6}}>Dec/Jan/Fév</div>
      </div>
      <div className="kpi">
        <div className="kpi-label">Staff Cost %</div>
        <div className="kpi-val" style={{color:staffCostPct>30?'var(--rouge)':staffCostPct>25?'var(--orange)':'var(--vert)'}}>{staffCostPct}%</div>
        <div className="text-muted" style={{marginTop:6}}>{eur(msCost)} / {eur(caSaison)}</div>
      </div>
      <div className="kpi">
        <div className="kpi-label">Note Google</div>
        <div className="kpi-val">{googleLoading?<span className="spinner" style={{display:'inline-block',marginRight:6}}/>:gRating?gRating.toFixed(1):GooglePlacesService.isConfigured()?'—':'—'}</div>
        <div className="text-muted" style={{marginTop:6}}>{gRating?`(${googleRating.totalReviews||0} avis)`:'Non configuré'}</div>
      </div>
    </div>

    {/* Row 3: CA mensuel vs BP + Répartition des coûts */}
    <div className="cg">
      <div className="card">
        <div className="card-h"><div><div className="card-t">CA mensuel vs BP</div><div className="card-st">Comparaison par mois</div></div></div>
        <div className="card-b">
          <div style={{display:'flex',alignItems:'flex-end',height:160,gap:12,justifyContent:'space-around'}}>
            {s&&s.monthly.map((m,i)=>{
              const monthName=['Dec','Jan','Fév'][i];
              const realCA=m.ventesNet;
              const bpMonth=bp.monthly[i];
              const bpCA=bpMonth?bpMonth.caTotal:0;
              const maxCA=Math.max(realCA,bpCA,1);
              const realH=(realCA/maxCA)*140;
              const bpH=(bpCA/maxCA)*140;
              return<div key={monthName} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
                <div style={{display:'flex',alignItems:'flex-end',gap:2,height:140}}>
                  <div style={{width:16,height:bpH+'px',background:'var(--gris-200)',borderRadius:'2px 2px 0 0'}} title={`BP: ${eur(bpCA)}`}/>
                  <div style={{width:16,height:realH+'px',background:'var(--bordeaux)',borderRadius:'2px 2px 0 0'}} title={`Réel: ${eur(realCA)}`}/>
                </div>
                <div style={{fontSize:11,fontWeight:500,color:'var(--gris-700)'}}>{monthName}</div>
              </div>;
            })}
          </div>
          <div style={{display:'flex',gap:16,fontSize:11,marginTop:12,paddingTop:12,borderTop:'1px solid var(--gris-100)'}}>
            <div><div style={{width:10,height:10,background:'var(--gris-200)',borderRadius:2,display:'inline-block',marginRight:4}}/>BP</div>
            <div><div style={{width:10,height:10,background:'var(--bordeaux)',borderRadius:2,display:'inline-block',marginRight:4}}/>Réel</div>
          </div>
        </div>
      </div>

      <div className="card">
        <div className="card-h"><div><div className="card-t">Répartition des coûts</div><div className="card-st">% du CA total</div></div></div>
        <div className="card-b">
          <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:24}}>
            <div style={{flex:1,textAlign:'center'}}>
              <div style={{width:120,height:120,background:`linear-gradient(90deg, var(--rouge) ${foodCostPct}%, var(--gris-200) ${foodCostPct}%)`,borderRadius:60,margin:'0 auto',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--blanc)',fontSize:14,fontWeight:700}}>
                {foodCostPct}%
              </div>
              <div style={{fontSize:11,color:'var(--gris-500)',marginTop:8,fontWeight:500}}>Food</div>
            </div>
            <div style={{flex:1,textAlign:'center'}}>
              <div style={{width:120,height:120,background:`linear-gradient(90deg, var(--orange) ${(barCostHT/caSaison*100).toFixed(1)}%, var(--gris-200) ${(barCostHT/caSaison*100).toFixed(1)}%)`,borderRadius:60,margin:'0 auto',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--blanc)',fontSize:14,fontWeight:700}}>
                {(barCostHT/caSaison*100).toFixed(1)}%
              </div>
              <div style={{fontSize:11,color:'var(--gris-500)',marginTop:8,fontWeight:500}}>Bar</div>
            </div>
            <div style={{flex:1,textAlign:'center'}}>
              <div style={{width:120,height:120,background:`linear-gradient(90deg, var(--bordeaux) ${staffCostPct}%, var(--gris-200) ${staffCostPct}%)`,borderRadius:60,margin:'0 auto',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--blanc)',fontSize:14,fontWeight:700}}>
                {staffCostPct}%
              </div>
              <div style={{fontSize:11,color:'var(--gris-500)',marginTop:8,fontWeight:500}}>Staff</div>
            </div>
            <div style={{flex:1,textAlign:'center'}}>
              <div style={{width:120,height:120,background:`linear-gradient(90deg, var(--vert) ${(ebitdaEst/caSaison*100).toFixed(1)}%, var(--gris-200) ${(ebitdaEst/caSaison*100).toFixed(1)}%)`,borderRadius:60,margin:'0 auto',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--blanc)',fontSize:14,fontWeight:700}}>
                {(ebitdaEst/caSaison*100).toFixed(1)}%
              </div>
              <div style={{fontSize:11,color:'var(--gris-500)',marginTop:8,fontWeight:500}}>Marge</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    {/* Row 4: Synthèse financière */}
    <div className="card fw">
      <div className="card-h"><div><div className="card-t">Synthèse financière</div><div className="card-st">Saison vs Business Plan</div></div></div>
      <div className="card-b">
        <div className="tbl">
          <table>
            <thead>
              <tr>
                <th>Indicateur</th>
                <th style={{textAlign:'right'}}>BP</th>
                <th style={{textAlign:'right'}}>Réel</th>
                <th style={{textAlign:'right'}}>Écart</th>
                <th style={{textAlign:'center'}}>Status</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>CA Total</td>
                <td style={{textAlign:'right'}}>{eur(bp.annual.caTotal)}</td>
                <td style={{textAlign:'right'}}>{eur(caSaison)}</td>
                <td style={{textAlign:'right',fontWeight:600}}>{caEcart>=0?'+':''}{caEcart}%</td>
                <td style={{textAlign:'center'}}><span className={`badge ${caSaison>=bp.annual.caTotal*0.95?'b-ok':'b-warn'}`}>{caSaison>=bp.annual.caTotal?'OK':'Dessous'}</span></td>
              </tr>
              <tr>
                <td>COGS Total</td>
                <td style={{textAlign:'right'}}>{eur(Math.abs(bp.annual.cogsTotal))}</td>
                <td style={{textAlign:'right'}}>{eur(cogsTotal)}</td>
                <td style={{textAlign:'right',fontWeight:600}}>{cogsTotal<=Math.abs(bp.annual.cogsTotal)?'✓':'+'}X</td>
                <td style={{textAlign:'center'}}><span className={`badge ${cogsTotal<=Math.abs(bp.annual.cogsTotal)?'b-ok':'b-warn'}`}>{cogsTotal<=Math.abs(bp.annual.cogsTotal)?'OK':'Dépasse'}</span></td>
              </tr>
              <tr>
                <td>Staff</td>
                <td style={{textAlign:'right'}}>{eur(Math.abs(bp.annual.staffCosts))}</td>
                <td style={{textAlign:'right'}}>{eur(msCost)}</td>
                <td style={{textAlign:'right',fontWeight:600}}>{msCost<=Math.abs(bp.annual.staffCosts)?'✓':'+'}X</td>
                <td style={{textAlign:'center'}}><span className={`badge ${msCost<=Math.abs(bp.annual.staffCosts)?'b-ok':'b-warn'}`}>{msCost<=Math.abs(bp.annual.staffCosts)?'OK':'Dépasse'}</span></td>
              </tr>
              <tr>
                <td style={{fontWeight:600}}>EBITDA</td>
                <td style={{textAlign:'right',fontWeight:600}}>{eur(bp.annual.ebitda)}</td>
                <td style={{textAlign:'right',fontWeight:600,color:ebitdaEst>=bp.annual.ebitda*0.85?'var(--vert)':'var(--rouge)'}}>{eur(ebitdaEst)}</td>
                <td style={{textAlign:'right',fontWeight:600}}>{Math.round((ebitdaEst-bp.annual.ebitda)/bp.annual.ebitda*1000)/10}%</td>
                <td style={{textAlign:'center'}}><span className={`badge ${ebitdaEst>=bp.annual.ebitda*0.85?'b-ok':'b-warn'}`}>{ebitdaEst>=bp.annual.ebitda*0.85?'OK':'Attention'}</span></td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>);
}

// ===== FINANCE =====
function Finance(){
  const invCtx=useInvoices();
  const allInvoices=invCtx.invoices;
  const loading=invCtx.loading;
  const loaded=invCtx.loaded;
  const[expandedGroup,setExpandedGroup]=useState('Coûts Directs (Prime Cost)');

  /* removed: each page no longer fetches its own invoices — shared via InvoiceContext
  useEffect(()=>{
    if(PennylaneService.getToken()){
      setLoading(true);
      PennylaneService.getAllSupplierInvoices({maxPages:50,onRefresh:(fresh)=>setAllInvoices(fresh)})
        .then(invoices=>{
          setAllInvoices(invoices);
          setLoaded(true);
        })
        .finally(()=>setLoading(false));
    }
  },[]); */

  // Filtrer les factures à la période saison (déc→fév, même période que CA Trivec)
  const _SF=typeof TRIVEC_SEASON!=='undefined'?TRIVEC_SEASON:null;
  const _sfFrom=_SF?_SF.periode.from.split('/').reverse().join('-'):'2025-12-01';
  const _sfTo=_SF?_SF.periode.to.split('/').reverse().join('-'):'2026-02-28';
  const seasonInvFin=useMemo(()=>allInvoices.filter(function(inv){return inv.date&&inv.date>=_sfFrom&&inv.date<=_sfTo;}),[allInvoices,_sfFrom,_sfTo]);
  const totals=useMemo(()=>SupplierMap.getTotals(seasonInvFin),[seasonInvFin]);
  const groupTotals=useMemo(()=>SupplierMap.getGroupTotals(totals),[totals]);
  const totalCosts=Object.values(totals).reduce((s,v)=>s+v,0);

  // CA from global period context (centralisé dans PeriodProvider)
  const pCtx=usePeriod();
  const tp=pCtx.trivecPeriod;
  const isSeason=tp._fromSeason||false;
  const caTotal=tp.total;
  const caFood=tp.caResto;
  const caBar=tp.caBar+tp.caClub;

  // Staff cost — use full season MS when using season CA
  const realStaffCost=isSeason?pCtx.msActive:pCtx.msProrata;
  const staffCosts=realStaffCost||totals['Staff']||0;
  // Override totals Staff with real payroll if available
  if(realStaffCost>0)totals['Staff']=realStaffCost;
  const primeCostTotal=(totals['Food']||0)+(totals['Bar']||0)+staffCosts;
  const primeCostPct=caTotal>0?(primeCostTotal/caTotal)*100:0;
  const totalCostsWithStaff=totalCosts+(realStaffCost>0&&!totals['Staff']?realStaffCost:0);
  const ebitda=caTotal-totalCosts;

  // Build P&L table data
  const plData=[];
  plData.push({type:'revenue',label:'CA Restaurant (Food HT)',amount:tp.caResto||0,pct:caTotal>0?100*((tp.caResto||0)/caTotal):0,isSubsection:false,isBold:true,color:'var(--vert)'});
  plData.push({type:'revenue',label:'CA Bar & Boissons (HT)',amount:(tp.caBar||0)+(tp.caClub||0),pct:caTotal>0?100*(((tp.caBar||0)+(tp.caClub||0))/caTotal):0,isSubsection:false,isBold:false,color:'var(--bordeaux)'});
  plData.push({type:'spacer'});

  for(const[groupName,groupInfo]of Object.entries(COST_GROUPS)){
    const groupTotal=groupTotals[groupName]||0;
    if(groupTotal===0)continue;
    plData.push({type:'group',label:groupName,amount:-groupTotal,pct:-100*(groupTotal/caTotal),groupName,color:groupInfo.color,isBold:true});
    const catsWithData=groupInfo.cats.filter(c=>(totals[c]||0)!==0);
    for(const cat of catsWithData){
      const catTotal=totals[cat]||0;
      plData.push({type:'category',label:cat,amount:-catTotal,pct:-100*(catTotal/caTotal),indent:true,color:CAT_COLORS[cat]});
    }
  }

  plData.push({type:'spacer'});
  plData.push({type:'total',label:'EBITDA',amount:ebitda,pct:100*(ebitda/caTotal),isSubsection:false,isBold:true,color:ebitda>0?'var(--vert)':'var(--rouge)'});

  // Donut data - cost proportions
  const donutSegments=[];
  const colors=['#581527','#7a2d42','#a04560','#c46880','#059669'];
  let colorIdx=0;
  for(const[groupName,groupInfo]of Object.entries(COST_GROUPS)){
    const groupTotal=groupTotals[groupName]||0;
    if(groupTotal>0){
      const pct=100*(groupTotal/totalCosts);
      donutSegments.push({value:pct,color:colors[colorIdx%colors.length]});
      colorIdx++;
    }
  }

  return(<div className="fin">
    {!PennylaneService.getToken()&&<div style={{background:'var(--orange-light)',border:'1px solid var(--orange)',borderRadius:8,padding:14,marginBottom:16,color:'var(--orange)',fontSize:13}}>
      <strong>Configuration requise :</strong> Veuillez configurer votre token Pennylane dans les paramètres pour afficher les données réelles des coûts.
    </div>}

    <div className="kpi-g">
      <div className="kpi"><div className="kpi-label">CA Total</div><div className="kpi-val">{eur(caTotal)}</div><div className="kpi-chg pos"><I.Up/> +11.9%</div></div>
      <div className="kpi"><div className="kpi-label">Coûts totaux</div><div className="kpi-val">{eur(totalCosts)}</div><div className="kpi-chg neu">{allInvoices.length} factures</div></div>
      <div className="kpi"><div className="kpi-label">EBITDA</div><div className="kpi-val" style={{color:ebitda>0?'var(--vert)':'var(--rouge)'}}>{eur(ebitda)}</div><div className={`kpi-chg ${ebitda>0?'pos':'neg'}`}>{ebitda>0?'Marge positive':'Déficit'}</div></div>
      <div className="kpi"><div className="kpi-label">Prime Cost %</div><div className="kpi-val">{primeCostPct.toFixed(1)}%</div><div className="kpi-chg neu">Food+Bar+Staff</div></div>
    </div>

    {loading&&<div style={{textAlign:'center',padding:40}}><div className="spinner" style={{width:24,height:24}}/><div style={{marginTop:10,fontSize:13,color:'var(--gris-500)'}}>Chargement Pennylane...</div></div>}

    {!loading&&<div>
    <div className="card" style={{marginBottom:16}}>
      <div className="card-h"><div><div className="card-t">Compte de résultat — {isSeason?'Saison':pCtx.dates.label}</div><div className="card-st">{isSeason?'Rapports Trivec + Coûts Pennylane':'CA Trivec ('+tp.days+'j) + Coûts Pennylane'}</div></div><span className="badge b-ima">Pennylane</span></div>
      <div className="card-b"><div className="tbl"><table>
        <thead><tr><th>Poste</th><th style={{textAlign:'right'}}>Montant</th><th style={{textAlign:'right'}}>% CA</th><th style={{width:180}}>Répartition</th></tr></thead>
        <tbody>
          {plData.map((row,i)=>{
            if(row.type==='spacer')return <tr key={`spacer-${i}`} style={{height:8}}><td colSpan={4}/></tr>;
            if(row.type==='revenue'||row.type==='group'||row.type==='category'||row.type==='total'){
              const isBold=row.isBold;
              const fontSize=row.isBold?14:13;
              return <tr key={i} style={{fontWeight:isBold?700:400,background:row.type==='total'?'var(--gris-50)':'transparent',borderTop:row.type==='total'?'2px solid var(--gris-300)':'none'}}>
                <td style={{paddingLeft:row.indent?40:14,fontSize}}>{row.label}{row.type==='revenue'&&!isSeason&&<span className="badge b-warn" style={{marginLeft:8,fontSize:9}}>Estimé</span>}{row.type==='revenue'&&isSeason&&<span className="badge b-ok" style={{marginLeft:8,fontSize:9}}>Rapport Trivec</span>}</td>
                <td style={{textAlign:'right',color:row.color,fontSize}}>{eur(row.amount)}</td>
                <td style={{textAlign:'right'}}>{Math.abs(row.pct).toFixed(1)}%</td>
                <td><div className="pbar"><div className="pfill" style={{width:`${Math.abs(row.pct)*1.5}%`,background:row.color}}/></div></td>
              </tr>;
            }
            return null;
          })}
        </tbody>
      </table></div></div>
    </div>

    <div className="cg" style={{marginTop:16}}>
      <div className="card">
        <div className="card-h"><div><div className="card-t">Répartition des charges</div><div className="card-st">{allInvoices.length} factures Pennylane</div></div></div>
        <div className="card-b">
          {donutSegments.length>0?<div className="donut-wrap">
            <Donut segments={donutSegments} size={150} thickness={22} centerValue={`${(totalCosts/caTotal*100).toFixed(0)}%`} centerLabel="Coûts"/>
            <div className="donut-legend">
              {Object.entries(COST_GROUPS).map(([groupName,groupInfo],i)=>{
                const gt=groupTotals[groupName]||0;
                if(gt===0)return null;
                return <div key={groupName} className="donut-legend-item">
                  <div className="donut-legend-dot" style={{background:colors[i%colors.length]}}/>
                  {groupName} — {(100*(gt/totalCosts)).toFixed(1)}%
                </div>;
              })}
            </div>
          </div>:<div style={{padding:20,textAlign:'center',color:'var(--gris-400)'}}>Aucune donnée Pennylane</div>}
        </div>
      </div>

function Costs(){
  const[tab,setTab]=useState('overview');

  const loading=invCtx.loading;
  const loaded=invCtx.loaded;

  const[detailSupplier,setDetailSupplier]=useState(null);
  const[mapSearch,setMapSearch]=useState('');
  const[mapVersion,setMapVersion]=useState(0);
  const[expandedCat,setExpandedCat]=useState(null);
  const[filterCat,setFilterCat]=useState('Tous');
  const[syncing,setSyncing]=useState(false);
  const[syncProgress,setSyncProgress]=useState('');
  const[syncResults,setSyncResults]=useState(null);

  // Build supplier names from shared invoices
  useEffect(()=>{
    if(allInvoices.length>0){
      const n={};allInvoices.forEach(inv=>{const sid=String(inv.supplier&&inv.supplier.id||'');if(sid&&!n[sid])n[sid]=SupplierMap.extractName(inv);});
      setSupplierNames(n);
    }
  },[allInvoices]);

  const pCtx=usePeriod();
  const tp=pCtx.trivecPeriod;
  const isSeason=tp._fromSeason||false;
  const realStaffMS=isSeason?pCtx.msActive:pCtx.msProrata;
  const _S=typeof TRIVEC_SEASON!=='undefined'?TRIVEC_SEASON:null;
  // Filtrer les factures à la MÊME période que le CA Trivec (déc→fév)
  // pour que les ratios Food Cost / Bar Cost soient cohérents
  const seasonDateFrom=_S?_S.periode.from.split('/').reverse().join('-'):'2025-12-01';
  const seasonDateTo=_S?_S.periode.to.split('/').reverse().join('-'):'2026-02-28';
  const seasonInvoices=useMemo(()=>allInvoices.filter(function(inv){
    return inv.date&&inv.date>=seasonDateFrom&&inv.date<=seasonDateTo;
  }),[allInvoices,seasonDateFrom,seasonDateTo]);
  // Tous les calculs basés sur seasonInvoices (même période que CA)
  const categorized=useMemo(()=>SupplierMap.categorize(seasonInvoices),[seasonInvoices,mapVersion]);
  const totals=useMemo(()=>SupplierMap.getTotals(seasonInvoices),[seasonInvoices,mapVersion]);
  // === DIAGNOSTIC : détail de chaque fournisseur + champs bruts API ===
  useEffect(()=>{
    if(!seasonInvoices.length)return;
    // Log RAW invoice fields for top suppliers (debug API data quality)
    const tresalletInvs=seasonInvoices.filter(inv=>SupplierMap.extractName(inv).toLowerCase().includes('tresallet'));
    // === DIAGNOSTIC COMPLET : toutes les factures par fournisseur (Food + Bar top) ===

    const diagSuppliers=['david','tresallet','cote frais','mammafiore','metzger','huguenin','armara','pernod'];

      const invs=seasonInvoices.filter(inv=>SupplierMap.extractName(inv).toLowerCase().includes(searchName));
      if(invs.length===0)return;
      const htTotal=invs.reduce((s,inv)=>s+parseFloat(inv.currency_amount_before_tax||0),0);
      const ttcTotal=invs.reduce((s,inv)=>s+parseFloat(inv.amount||0),0);
      // Group by month
      const byMonth={};
      invs.forEach(inv=>{const m=(inv.date||'?').substring(0,7);if(!byMonth[m])byMonth[m]=[];byMonth[m].push(inv);});
      console.log(`\n[IMA] === ${searchName.toUpperCase()} : ${invs.length} fact. = ${Math.round(htTotal)}€ HT / ${Math.round(ttcTotal)}€ TTC ===`);
      Object.keys(byMonth).sort().forEach(m=>{
        const mInvs=byMonth[m].sort((a,b)=>parseFloat(b.amount||0)-parseFloat(a.amount||0));
        const mHT=mInvs.reduce((s,i)=>s+parseFloat(i.currency_amount_before_tax||0),0);
        console.log(`  ${m} (${mInvs.length} fact. = ${Math.round(mHT)}€ HT):`);
        mInvs.forEach(inv=>{
          console.log(`    #${(inv.invoice_number||'?').padEnd(25)} ${inv.date} | HT:${String(inv.currency_amount_before_tax).padStart(10)} | TTC:${String(inv.amount).padStart(10)} | id:${inv.id}`);
        });
      });
      // Detect suspicious patterns
      const nums=invs.map(i=>i.invoice_number||'');
      const numericOnly=nums.filter(n=>/^\d+$/.test(n));
      const withPrefix=nums.filter(n=>/^[A-Za-z]/.test(n));
      const amountDupes={};
      invs.forEach(inv=>{const a=inv.amount;if(!amountDupes[a])amountDupes[a]=0;amountDupes[a]++;});
      const dupeAmounts=Object.entries(amountDupes).filter(([_,c])=>c>1&&parseFloat(_)>0);
      if(numericOnly.length>0)console.log(`  ⚠️ ${numericOnly.length} n° purement numériques: ${numericOnly.slice(0,5).join(', ')}`);
      if(dupeAmounts.length>0)console.log(`  ⚠️ ${dupeAmounts.length} montants en double: ${dupeAmounts.slice(0,5).map(([a,c])=>`${a}€ ×${c}`).join(', ')}`);
    });
    // === CONTROLE CROISE : Grands Livres fournisseurs vs API ===
    var glReference={
      'metzger':{ttcExpected:17323,source:'GL Metzger Freres (oct25-mar26)'},
      'huguenin':{ttcExpected:6339,source:'GL Huguenin (nov25-mar26)'},

    };

      var searchName=entry[0],ref=entry[1];
      var invs=seasonInvoices.filter(function(inv){return SupplierMap.extractName(inv).toLowerCase().includes(searchName);});
      var apiTTC=Math.round(invs.reduce(function(s,inv){return s+Math.abs(parseFloat(inv.amount||0));},0));
      var ecart=apiTTC-ref.ttcExpected;
      var ecartPct=ref.ttcExpected>0?Math.round(ecart/ref.ttcExpected*100):0;
      var status=Math.abs(ecartPct)<=5?'OK':'ECART';
      console.log('[IMA] '+status+' '+searchName.toUpperCase()+': API='+apiTTC+'E vs GL='+ref.ttcExpected+'E (ecart: '+(ecart>0?'+':'')+ecart+'E = '+ecartPct+'%) ['+ref.source+']');
    });

    ['Food','Bar'].forEach(cat=>{
      const catInvs=seasonInvoices.filter(inv=>SupplierMap.getCategory(String(inv.supplier?.id||''))===cat);
      const byS={};
      catInvs.forEach(inv=>{
        const sid=String(inv.supplier?.id||'?');
        const name=SupplierMap.extractName(inv);
        if(!byS[sid])byS[sid]={name,ht:0,ttc:0,n:0,htField:0,noHT:0};
        const ht=parseFloat(inv.currency_amount_before_tax||0);
        const ttc=parseFloat(inv.amount||0);
        byS[sid].ht+=ht||ttc;
        byS[sid].ttc+=ttc;
        byS[sid].n++;
        if(ht)byS[sid].htField++;else byS[sid].noHT++;
      });
      const rows=Object.entries(byS).sort((a,b)=>b[1].ht-a[1].ht).map(([sid,d])=>
        `  ${d.name} (id:${sid}): ${Math.round(d.ht)}€ HT / ${Math.round(d.ttc)}€ TTC — ${d.n} fact. (${d.htField} avec HT, ${d.noHT} sans)`
      );
      console.log(`[IMA DIAG] === ${cat} === ${catInvs.length} factures, Total: ${Math.round(totals[cat]||0)}€ HT\n`+rows.join('\n'));
    });
  },[seasonInvoices,totals]);
  const groupTotals=useMemo(()=>SupplierMap.getGroupTotals(totals),[totals]);
  const totalAll=Object.values(totals).reduce((s,v)=>s+v,0);

  const barAchats=totals['Bar']||0;

  const foodTotal=Math.max(0,foodAchats-STOCK_VALUE_0103.food);

  const caNourritureTTC=isSeason&&_S?(_S.categories.find(function(c){return c.nom==='Nourriture';})||{}).montant||0:(tp.caResto||0);
  const caNourriture=isSeason?Math.round(caNourritureTTC/1.10):caNourritureTTC;
  const caBoissonsTTC=isSeason&&_S?((_S.categories.find(function(c){return c.nom==='Boissons Alcoolisées';})||{}).montant||0)+((_S.categories.find(function(c){return c.nom==='Boissons Sans Alcool';})||{}).montant||0):((tp.caBar||0)+(tp.caClub||0));
  const caBoissonsAlcTTC=isSeason&&_S?(_S.categories.find(function(c){return c.nom==='Boissons Alcoolisées';})||{}).montant||0:0;
  const caBoissonsAlcHT=Math.round(caBoissonsAlcTTC/1.20);
  const caBoissons_SA_TTC=isSeason&&_S?(_S.categories.find(function(c){return c.nom==='Boissons Sans Alcool';})||{}).montant||0:0;
  const caBoissons_SA_HT=Math.round(caBoissons_SA_TTC/1.10);
  const caBoissons=isSeason?(caBoissonsAlcHT+caBoissons_SA_HT):caBoissonsTTC;
  const caTotalSeason=tp.total||0;
  const foodCostPct=caNourriture>0&&foodTotal>0?Math.round(foodTotal/caNourriture*1000)/10:null;
  const barCostPct=caBoissons>0&&barTotal>0?Math.round(barTotal/caBoissons*1000)/10:null;
  const primeCostPct=caTotalSeason>0?Math.round(primeCost/caTotalSeason*1000)/10:null;

  const supplierGroups=useMemo(()=>{
    const groups={};
    seasonInvoices.forEach(inv=>{
      const sid=String(inv.supplier?.id||'');
      if(!sid)return;
      if(!groups[sid])groups[sid]={id:sid,name:supplierNames[sid]||'Inconnu',total:0,totalHT:0,count:0,cat:SupplierMap.getCategory(sid)};
      groups[sid].total+=parseFloat(inv.amount||0);
      groups[sid].totalHT+=parseFloat(inv.currency_amount_before_tax||0);
      groups[sid].count++;

    return Object.values(groups).sort((a,b)=>Math.abs(b.total)-Math.abs(a.total));

          <tr key={inv.id||i}>

          </tr>))}</tbody>
        <tfoot><tr style={{fontWeight:700,background:'var(--gris-50)',borderTop:'2px solid var(--gris-300)'}}>
          <td>TOTAL</td><td/><td/>

          <td style={{textAlign:'right',color:color||'var(--bordeaux)',fontSize:15}}>{eur(totalTTC)}</td><td/>

    </div>);
  };

  return(<div className="fin">
    <div className="tabs">
      <div className={`tab ${tab==='overview'?'active':''}`} onClick={()=>setTab('overview')}>Vue d'ensemble</div>
      <div className={`tab ${tab==='food'?'active':''}`} onClick={()=>setTab('food')}>Food</div>
      <div className={`tab ${tab==='bar'?'active':''}`} onClick={()=>setTab('bar')}>Bar</div>
      <div className={`tab ${tab==='charges'?'active':''}`} onClick={()=>setTab('charges')}>Charges</div>
      <div className={`tab ${tab==='ratios'?'active':''}`} onClick={()=>setTab('ratios')}>Ratios & COGS</div>
      <div className={`tab ${tab==='fournisseurs'?'active':''}`} onClick={()=>setTab('fournisseurs')}>Tous les fournisseurs</div>
      <div className={`tab ${tab==='mapping'?'active':''}`} onClick={()=>setTab('mapping')}>Mapping</div>
    </div>

    <div style={{background:'var(--cream,#fdf6f0)',border:'1px solid #e8d5c4',borderRadius:8,padding:'10px 14px',marginBottom:14,fontSize:11,color:'var(--gris-600)'}}>
      <strong>Calcul des ratios :</strong> Food Cost et Bar Cost = <strong>Consommation HT ÷ CA HT</strong>. Consommation = Achats Pennylane − Stock clôture (inventaire 01/03/2026). Seules les factures de la période saison sont prises en compte.
      {STOCK_VALUE_0103.bar>0&&<span style={{display:'block',marginTop:4,color:'var(--bordeaux)'}}><strong>Stock Bar déduit :</strong> {eur(STOCK_VALUE_0103.bar)} (Achats bruts: {eur(barAchats)} → Conso: {eur(barTotal)})</span>}
      {STOCK_VALUE_0103.food>0&&<span style={{display:'block',marginTop:2,color:'var(--bordeaux)'}}><strong>Stock Food déduit :</strong> {eur(STOCK_VALUE_0103.food)} (Achats bruts: {eur(foodAchats)} → Conso: {eur(foodTotal)})</span>}
    </div>

    {loading&&<div style={{textAlign:'center',padding:40}}><div className="spinner" style={{width:24,height:24}}/><div style={{marginTop:10,fontSize:13,color:'var(--gris-500)'}}>Chargement Pennylane...</div></div>}

    {!loading&&loaded&&<div>
    {/* KPI */}
    <div className="kpi-g">
      <div className="kpi"><div className="kpi-label">Food Cost %</div><div className="kpi-val" style={{color:foodCostPct!==null?(foodCostPct<=30?'var(--vert)':foodCostPct<=35?'var(--orange)':'var(--rouge)'):'var(--gris-300)'}}>{foodCostPct!==null?foodCostPct+'%':'—'}</div><div className={`kpi-chg ${foodCostPct!==null&&foodCostPct<=30?'pos':'neg'}`}>{foodCostPct!==null?`Conso ${eur(foodTotal)} / CA ${eur(caNourriture)}`:'Objectif ≤ 30%'}</div>{STOCK_VALUE_0103.food>0&&<div style={{fontSize:9,color:'var(--gris-400)',marginTop:2}}>Achats {eur(foodAchats)} − Stock {eur(STOCK_VALUE_0103.food)}</div>}</div>
      <div className="kpi"><div className="kpi-label">Bar Cost %</div><div className="kpi-val" style={{color:barCostPct!==null?(barCostPct<=22?'var(--vert)':barCostPct<=28?'var(--orange)':'var(--rouge)'):'var(--gris-300)'}}>{barCostPct!==null?barCostPct+'%':'—'}</div><div className={`kpi-chg ${barCostPct!==null&&barCostPct<=22?'pos':'neg'}`}>{barCostPct!==null?`Conso ${eur(barTotal)} / CA ${eur(caBoissons)}`:'Objectif ≤ 22%'}</div>{STOCK_VALUE_0103.bar>0&&<div style={{fontSize:9,color:'var(--gris-400)',marginTop:2}}>Achats {eur(barAchats)} − Stock {eur(STOCK_VALUE_0103.bar)}</div>}</div>
      <div className="kpi"><div className="kpi-label">Prime Cost %</div><div className="kpi-val" style={{color:primeCostPct!==null?(primeCostPct<=65?'var(--vert)':primeCostPct<=70?'var(--orange)':'var(--rouge)'):'var(--gris-300)'}}>{primeCostPct!==null?primeCostPct+'%':'—'}</div><div className={`kpi-chg ${primeCostPct!==null&&primeCostPct<=65?'pos':'neg'}`}>{primeCostPct!==null?`Food+Bar+Staff / CA Net`:'Objectif ≤ 65%'}</div></div>
      <div className="kpi"><div className="kpi-label">Staff Cost %</div><div className="kpi-val" style={{color:caTotalSeason>0?(realStaffMS/caTotalSeason>0.3?'var(--rouge)':realStaffMS/caTotalSeason>0.25?'var(--orange)':'var(--vert)'):'var(--gris-300)'}}>{caTotalSeason>0?Math.round(realStaffMS/caTotalSeason*1000)/10+'%':'—'}</div><div className={`kpi-chg ${caTotalSeason>0&&realStaffMS/caTotalSeason<=0.3?'pos':'neg'}`}>{caTotalSeason>0?`${eur(realStaffMS)} / CA ${eur(caTotalSeason)}`:'Objectif ≤ 30%'}</div></div>
    </div>

    {/* Détail achats */}
    <div className="kpi-g" style={{marginBottom:0}}>
      <div className="kpi"><div className="kpi-label">Achats Food (déc-fév)</div><div className="kpi-val" style={{color:'#059669'}}>{eur(foodTotal)}</div><div className="kpi-chg pos">{seasonInvoices.filter(function(inv){return SupplierMap.getCategory(String(inv.supplier&&inv.supplier.id||''))==='Food';}).length} factures</div></div>
      <div className="kpi"><div className="kpi-label">Achats Bar (déc-fév)</div><div className="kpi-val" style={{color:'#581527'}}>{eur(barTotal)}</div><div className="kpi-chg pos">{seasonInvoices.filter(function(inv){return SupplierMap.getCategory(String(inv.supplier&&inv.supplier.id||''))==='Bar';}).length} factures</div></div>
      <div className="kpi"><div className="kpi-label">Total charges</div><div className="kpi-val">{eur(totalAll)}</div><div className="kpi-chg neu">{seasonInvoices.length} factures déc-fév</div></div>
      <div className="kpi"><div className="kpi-label">Non classé</div><div className="kpi-val" style={{color:(totals['Non classé']||0)>0?'var(--rouge)':'var(--vert)'}}>{eur(totals['Non classé']||0)}</div>
        <div className="kpi-chg neg">{supplierGroups.filter(s=>s.cat==='Non classé').length} fournisseurs</div></div>
    </div>

    {/* Détail fournisseurs Food & Bar (saison) — cliquable pour voir chaque facture */}
    {(foodTotal>0||barTotal>0)&&<FoodBarDetail seasonInvoices={seasonInvoices} foodTotal={foodTotal} barTotal={barTotal}/>}

    {/* ===== TAB: OVERVIEW ===== */}
    {tab==='overview'&&<div>
      {/* Cost groups summary */}
      {Object.entries(COST_GROUPS).map(([groupName,groupInfo])=>{
        const groupTotal=groupInfo.cats.reduce((s,c)=>s+(totals[c]||0),0);
        if(groupTotal===0&&groupName==='Hors Exploitation')return null;
        const catsWithData=groupInfo.cats.filter(c=>(totals[c]||0)!==0);
        return(<div className="card" key={groupName} style={{marginBottom:14}}>
          <div className="card-h" style={{cursor:'pointer'}} onClick={()=>setExpandedCat(expandedCat===groupName?null:groupName)}>
            <div style={{display:'flex',alignItems:'center',gap:10}}>
              <div style={{width:4,height:36,borderRadius:2,background:groupInfo.color}}/>
              <div>
                <div className="card-t">{groupName}</div>
                <div className="card-st">{groupInfo.desc} — {catsWithData.length} catégorie{catsWithData.length>1?'s':''}</div>
              </div>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:14}}>
              <div style={{textAlign:'right'}}>
                <div style={{fontSize:22,fontWeight:700,color:groupInfo.color}}>{eur(groupTotal)}</div>
                <div style={{fontSize:11,color:'var(--gris-400)'}}>{totalAll>0?((groupTotal/totalAll)*100).toFixed(1):0}% du total</div>
              </div>
              <I.Chev/>
            </div>
          </div>
          {(expandedCat===groupName||groupName.includes('Prime'))&&<div className="card-b" style={{paddingTop:0}}>
            {catsWithData.map(cat=>{
              const catInvoices=categorized[cat]||[];
              const catTotal=totals[cat]||0;
              const catHT=catInvoices.reduce((s,i)=>s+parseFloat(i.currency_amount_before_tax||0),0);
              return(<div key={cat} style={{padding:'10px 0',borderBottom:'1px solid var(--gris-100)'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',cursor:'pointer'}} onClick={()=>setExpandedCat(expandedCat===cat?groupName:cat)}>
                  <div style={{display:'flex',alignItems:'center',gap:8}}>
                    <div style={{width:10,height:10,borderRadius:3,background:CAT_COLORS[cat]||'var(--gris-400)'}}/>
                    <div style={{fontWeight:500,fontSize:13}}>{cat}</div>
                    <span className="badge b-ima" style={{fontSize:9}}>{catInvoices.length} fact.</span>
                  </div>
                  <div style={{display:'flex',alignItems:'center',gap:14}}>
                    <div style={{fontSize:11,color:'var(--gris-500)'}}>HT: {eur(catHT)}</div>
                    <div style={{fontWeight:700,fontSize:14}}>{eur(catTotal)}</div>
                    <div style={{width:100}}><div className="pbar"><div className="pfill" style={{width:`${totalAll>0?Math.min(Math.abs(catTotal/totalAll)*100*3,100):0}%`,background:CAT_COLORS[cat]||'var(--gris-400)'}}/></div></div>
                  </div>
                </div>
                {expandedCat===cat&&<div style={{marginTop:8}}><div className="tbl"><table style={{fontSize:12}}>
                  <thead><tr><th>Fournisseur</th><th>Date</th><th style={{textAlign:'right'}}>HT</th><th style={{textAlign:'right'}}>TTC</th></tr></thead>
                  <tbody>{catInvoices.sort((a,b)=>new Date(b.date)-new Date(a.date)).map((inv,i)=>(
                    <tr key={inv.id||i}><td>{SupplierMap.extractName(inv)}</td><td>{inv.date}</td>
                    <td style={{textAlign:'right'}}>{eur(parseFloat(inv.currency_amount_before_tax||0))}</td>
                    <td style={{textAlign:'right',fontWeight:600}}>{eur(parseFloat(inv.amount||0))}</td></tr>
                  ))}</tbody>
                </table></div></div>}
              </div>);
            })}
            {catsWithData.length===0&&<div style={{padding:10,color:'var(--gris-400)',fontSize:12}}>Aucune facture dans ce groupe</div>}
          </div>}
        </div>);
      })}

      {/* Répartition bar chart */}
      <div className="card">
        <div className="card-h"><div><div className="card-t">Répartition des charges</div></div></div>
        <div className="card-b">
          <HBar data={ALL_CATEGORIES.filter(c=>(totals[c]||0)!==0).map(c=>({
            label:c,value:Math.abs(totals[c]||0),display:eur(totals[c]||0)
          })).sort((a,b)=>b.value-a.value)}
            maxVal={Math.max(...ALL_CATEGORIES.map(c=>Math.abs(totals[c]||0)))||1}
            color="var(--bordeaux)"/>
        </div>
      </div>
    </div>}

    {/* ===== TAB: FOOD ===== */}
    {tab==='food'&&<div>
      <InvoiceTable catName="Achats Food" invoices={categorized['Food']||[]} color="#059669"/>
      {(categorized['Food']||[]).length===0&&<div className="alert-i a-warn"><I.Warn/><div><div className="at">Aucune facture Food</div><div className="as">Classez vos fournisseurs dans l'onglet Mapping</div></div></div>}
    </div>}

    {/* ===== TAB: BAR ===== */}
    {tab==='bar'&&<div>
      <InvoiceTable catName="Achats Bar" invoices={categorized['Bar']||[]} color="#581527"/>
      {(categorized['Bar']||[]).length===0&&<div className="alert-i a-warn"><I.Warn/><div><div className="at">Aucune facture Bar</div><div className="as">Classez vos fournisseurs dans l'onglet Mapping</div></div></div>}
    </div>}

    {/* ===== TAB: CHARGES ===== */}
    {tab==='charges'&&<div>
      {Object.entries(COST_GROUPS).filter(([g])=>!g.includes('Prime')).map(([groupName,groupInfo])=>{
        const catsWithData=groupInfo.cats.filter(c=>(categorized[c]||[]).length>0);
        if(catsWithData.length===0)return null;
        return catsWithData.map(cat=>(
          <InvoiceTable key={cat} catName={cat} invoices={categorized[cat]||[]} color={CAT_COLORS[cat]}/>
        ));
      })}
    </div>}

    {/* ===== TAB: RATIOS & COGS ===== */}
    {tab==='ratios'&&(()=>{
      const data=TrivecService._getData();
      const assorts=data.assortiments||{};
      const pMap={};
      for(const[ds,assort]of Object.entries(assorts)){
        (assort.products||[]).forEach(p=>{
          const k=p.nom;
          if(!pMap[k])pMap[k]={nom:p.nom,categorie1:p.categorie1,categorie2:p.categorie2,categorie3:p.categorie3,totalQty:0,totalPrix:0,jours:[]};
          pMap[k].totalQty+=p.quantite;pMap[k].totalPrix+=p.prix;
        });
      }
      const trivecProds=Object.values(pMap);
      const cogs=InventoryService.calculateCOGS(trivecProds);
      const foodPct=cogs.foodCostPct;const barPct=cogs.barCostPct;
      return<div>
        {/* KPIs */}
        <div className="kpi-g">
          <div className="kpi"><div className="kpi-label">Food Cost</div><div className="kpi-val" style={{color:foodPct!==null?(foodPct<=28?'var(--vert)':'var(--rouge)'):'var(--gris-300)'}}>{foodPct!==null?foodPct+'%':'—'}</div><div className={`kpi-chg ${foodPct!==null&&foodPct<=28?'pos':'neg'}`}>Objectif: ≤ 28%</div></div>
          <div className="kpi"><div className="kpi-label">Bar Cost</div><div className="kpi-val" style={{color:barPct!==null?(barPct<=20?'var(--vert)':'var(--rouge)'):'var(--gris-300)'}}>{barPct!==null?barPct+'%':'—'}</div><div className={`kpi-chg ${barPct!==null&&barPct<=20?'pos':'neg'}`}>Objectif: ≤ 20%</div></div>
          <div className="kpi"><div className="kpi-label">COGS Food</div><div className="kpi-val">{eur(cogs.foodCOGS)}</div><div className="kpi-chg neu">CA Food: {eur(cogs.foodCA)}</div></div>
          <div className="kpi"><div className="kpi-label">COGS Bar</div><div className="kpi-val">{eur(cogs.barCOGS)}</div><div className="kpi-chg neu">CA Bar: {eur(cogs.barCA)}</div></div>
        </div>

        {/* Matching quality */}
        <div className="alert-i a-info" style={{marginBottom:14}}>
          <I.Info/><div><div className="at">Couverture du matching: {cogs.total>0?Math.round(cogs.matched/cogs.total*100):0}%</div><div className="as">{cogs.matched} produits matchés sur {cogs.total} — {cogs.unmatched} sans prix d'achat</div></div>
        </div>

        {/* Sync Pennylane button */}
        <div className="card" style={{marginBottom:14}}>
          <div className="card-h">
            <div><div className="card-t">Synchronisation Pennylane → Base prix</div><div className="card-st">Récupère les lignes de factures fournisseurs et met à jour les prix d'achat</div></div>
            {!syncing?<button className="btn btn-primary" onClick={async()=>{
              if(!PennylaneService.getToken()){setSyncResults({error:'Pennylane non connecté. Configurez le token dans Administration.'});return;}
              setSyncing(true);setSyncProgress('Chargement des factures...');setSyncResults(null);
              try{
                const invoices=await PennylaneService.getAllSupplierInvoices({maxPages:50});
                const foodBarInv=invoices.filter(inv=>{const sid=String(inv.supplier?.id||'');const cat=SupplierMap.getCategory(sid);return cat==='Food'||cat==='Bar';});
                if(foodBarInv.length===0){setSyncResults({error:'Aucune facture Food/Bar trouvée. Classez vos fournisseurs dans l\'onglet Mapping.'});setSyncing(false);return;}
                setSyncProgress(`Récupération détails: 0/${foodBarInv.length} factures...`);
                const ids=foodBarInv.map(i=>i.id).filter(Boolean);
                const detailed=await PennylaneService.getInvoicesWithLines(ids,(done,total)=>{
                  setSyncProgress(`Récupération détails: ${done}/${total} factures...`);
                });
                setSyncProgress('Analyse des lignes...');
                const results=InventoryService.syncFromPennylane(detailed);
                setSyncResults(results);
              }catch(e){setSyncResults({error:e.message});}
              setSyncing(false);
            }}>Synchroniser les prix</button>:
            <div style={{display:'flex',alignItems:'center',gap:8}}><div className="spinner" style={{width:16,height:16}}/><span style={{fontSize:12,color:'var(--gris-500)'}}>{syncProgress}</span></div>}
          </div>
          {syncResults&&<div className="card-b">
            {syncResults.error?<div className="alert-i a-warn"><I.Warn/><div><div className="at">{syncResults.error}</div></div></div>:
            <div>
              <div style={{display:'flex',gap:16,marginBottom:10,fontSize:13}}>
                <span style={{color:'var(--vert)',fontWeight:600}}>+{syncResults.added.length} nouveaux</span>
                <span style={{color:'var(--bleu)',fontWeight:600}}>{syncResults.updated.length} mis à jour</span>
                <span style={{color:'var(--gris-400)'}}>{syncResults.skipped.length} inchangés</span>
              </div>
              {syncResults.added.length>0&&<div style={{marginBottom:8}}>
                <div style={{fontSize:11,fontWeight:600,marginBottom:4,color:'var(--vert)'}}>Produits ajoutés:</div>
                {syncResults.added.slice(0,10).map((a,i)=><div key={i} style={{fontSize:11,padding:'2px 0',borderBottom:'1px solid var(--gris-100)'}}><span className="badge b-ok" style={{fontSize:8,marginRight:6}}>NOUVEAU</span>{a.label} — <strong>{a.prix.toFixed(2)}€</strong> <span style={{color:'var(--gris-400)'}}>({a.cat} via {a.supplier})</span></div>)}
                {syncResults.added.length>10&&<div style={{fontSize:10,color:'var(--gris-400)',marginTop:4}}>... et {syncResults.added.length-10} autres</div>}
              </div>}
              {syncResults.updated.length>0&&<div>
                <div style={{fontSize:11,fontWeight:600,marginBottom:4,color:'var(--bleu)'}}>Prix mis à jour:</div>
                {syncResults.updated.slice(0,10).map((u,i)=><div key={i} style={{fontSize:11,padding:'2px 0',borderBottom:'1px solid var(--gris-100)'}}><span className="badge b-info" style={{fontSize:8,marginRight:6}}>MÀJ</span>{u.label} → {u.matched}: <span style={{textDecoration:'line-through',color:'var(--gris-400)'}}>{u.oldPrix.toFixed(2)}€</span> → <strong>{u.newPrix.toFixed(2)}€</strong> <span style={{color:u.pctChange>10?'var(--rouge)':'var(--gris-400)'}}>({u.pctChange>0?'+':''}{u.pctChange}%)</span></div>)}
                {syncResults.updated.length>10&&<div style={{fontSize:10,color:'var(--gris-400)',marginTop:4}}>... et {syncResults.updated.length-10} autres</div>}
              </div>}
            </div>}
          </div>}
        </div>

        {/* Visual bars Food vs Bar */}
        <div className="cg">
          <div className="card">
            <div className="card-h"><div><div className="card-t">Décomposition Food Cost</div><div className="card-st">Coût des matières / CA Food</div></div><span className="badge" style={{background:foodPct!==null&&foodPct<=28?'var(--vert-light)':'var(--rouge-light)',color:foodPct!==null&&foodPct<=28?'var(--vert)':'var(--rouge)'}}>{foodPct!==null?foodPct+'%':'N/A'}</span></div>
            <div className="card-b">
              <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:8}}>
                <div style={{width:80,fontSize:12,fontWeight:500}}>Coût</div>
                <div style={{flex:1,height:24,background:'var(--gris-100)',borderRadius:6,overflow:'hidden'}}>
                  <div style={{height:'100%',width:`${cogs.foodCA>0?Math.min(cogs.foodCOGS/cogs.foodCA*100,100):0}%`,background:'#059669',borderRadius:6,transition:'width .5s'}}/>
                </div>
                <div style={{width:80,textAlign:'right',fontSize:12,fontWeight:600}}>{eur(cogs.foodCOGS)}</div>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:12}}>
                <div style={{width:80,fontSize:12,fontWeight:500}}>CA</div>
                <div style={{flex:1,height:24,background:'var(--gris-100)',borderRadius:6,overflow:'hidden'}}>
                  <div style={{height:'100%',width:'100%',background:'var(--vert)',opacity:0.3,borderRadius:6}}/>
                </div>
                <div style={{width:80,textAlign:'right',fontSize:12,fontWeight:600}}>{eur(cogs.foodCA)}</div>
              </div>
            </div>
          </div>
          <div className="card">
            <div className="card-h"><div><div className="card-t">Décomposition Bar Cost</div><div className="card-st">Coût des matières / CA Bar</div></div><span className="badge" style={{background:barPct!==null&&barPct<=20?'var(--vert-light)':'var(--rouge-light)',color:barPct!==null&&barPct<=20?'var(--vert)':'var(--rouge)'}}>{barPct!==null?barPct+'%':'N/A'}</span></div>
            <div className="card-b">
              <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:8}}>
                <div style={{width:80,fontSize:12,fontWeight:500}}>Coût</div>
                <div style={{flex:1,height:24,background:'var(--gris-100)',borderRadius:6,overflow:'hidden'}}>
                  <div style={{height:'100%',width:`${cogs.barCA>0?Math.min(cogs.barCOGS/cogs.barCA*100,100):0}%`,background:'var(--bordeaux)',borderRadius:6,transition:'width .5s'}}/>
                </div>
                <div style={{width:80,textAlign:'right',fontSize:12,fontWeight:600}}>{eur(cogs.barCOGS)}</div>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:12}}>
                <div style={{width:80,fontSize:12,fontWeight:500}}>CA</div>
                <div style={{flex:1,height:24,background:'var(--gris-100)',borderRadius:6,overflow:'hidden'}}>
                  <div style={{height:'100%',width:'100%',background:'var(--bordeaux)',opacity:0.3,borderRadius:6}}/>
                </div>
                <div style={{width:80,textAlign:'right',fontSize:12,fontWeight:600}}>{eur(cogs.barCA)}</div>
              </div>
            </div>
          </div>
        </div>

        {/* Detail table: products with worst margins */}
        <div className="card" style={{marginTop:14}}>
          <div className="card-h"><div><div className="card-t">Détail par produit — Marge sur coût matière</div><div className="card-st">Croisement ventes Trivec × prix d'achat inventaire</div></div><span className="badge b-ima">{cogs.matched} produits matchés</span></div>
          <div className="card-b"><div className="tbl"><table>
            <thead><tr>
              <th style={{textAlign:'left',minWidth:180}}>Produit</th>
              <th style={{textAlign:'left'}}>Type</th>
              <th style={{textAlign:'center'}}>Format</th>
              <th style={{textAlign:'right'}}>Qté</th>
              <th style={{textAlign:'right'}}>CA</th>
              <th style={{textAlign:'right'}}>Prix achat btl</th>
              <th style={{textAlign:'right'}}>Coût/unité</th>
              <th style={{textAlign:'right'}}>COGS total</th>
              <th style={{textAlign:'center'}}>Marge %</th>
            </tr></thead>
            <tbody>
              {cogs.details.filter(d=>d.matched).sort((a,b)=>{
                const ma=a.ca>0?(1-a.cost/a.ca):1;
                const mb=b.ca>0?(1-b.cost/b.ca):1;
                return ma-mb;
              }).slice(0,150).map((d,i)=>{
                const marge=d.ca>0?Math.round((1-d.cost/d.ca)*100):0;
                const fmtColors={btl:'var(--vert)',mag:'var(--bleu)',verre:'var(--orange)',shot:'var(--orange)',coupe:'var(--orange)',unit:'var(--gris-500)'};
                const fmtLabels={btl:'Btl',mag:'Mag',verre:'1/17',shot:'1/17',coupe:'1/17',unit:'—'};
                return<tr key={i}>
                  <td style={{textAlign:'left',fontWeight:500,fontSize:12}}>{d.nom}</td>
                  <td style={{textAlign:'left'}}><span className={`badge ${d.type==='food'?'b-ok':'b-ima'}`} style={{fontSize:9}}>{d.type==='food'?'Food':'Bar'}</span></td>
                  <td style={{textAlign:'center'}}><span className="badge" style={{fontSize:8,background:fmtColors[d.format]||'var(--gris-100)',color:'white'}}>{fmtLabels[d.format]||d.format}</span></td>
                  <td style={{textAlign:'right'}}>{d.qty}</td>
                  <td style={{textAlign:'right',fontWeight:500}}>{Math.round(d.ca).toLocaleString('fr-FR')}€</td>
                  <td style={{textAlign:'right',color:'var(--gris-500)',fontSize:11}}>{d.prixAchat?.toLocaleString('fr-FR',{minimumFractionDigits:2})}€</td>
                  <td style={{textAlign:'right',color:'var(--bordeaux)',fontWeight:600}}>{d.costPerUnit?.toFixed(2)}€</td>
                  <td style={{textAlign:'right',fontWeight:600}}>{Math.round(d.cost).toLocaleString('fr-FR')}€</td>
                  <td style={{textAlign:'center'}}><span className={`badge ${marge>70?'b-ok':marge>50?'b-info':marge>30?'b-warn':'b-err'}`} style={{fontSize:10}}>{marge}%</span></td>
                </tr>;
              })}
            </tbody>
          </table></div>
          {cogs.unmatched>0&&<div style={{padding:10,fontSize:11,color:'var(--gris-400)',borderTop:'1px solid var(--gris-100)'}}>⚠ {cogs.unmatched} produit(s) Trivec sans correspondance dans le référentiel prix d'achat — non inclus dans le calcul COGS</div>}
          </div>
        </div>
      </div>;
    })()}

    {/* ===== TAB: ALL INVOICES ===== */}
    {tab==='fournisseurs'&&<div>
      <div style={{display:'flex',gap:6,marginBottom:14,flexWrap:'wrap'}}>
        <button className={`btn btn-sm ${filterCat==='Tous'?'btn-primary':'btn-secondary'}`} onClick={()=>setFilterCat('Tous')}>Tous ({seasonInvoices.length})</button>
        {ALL_CATEGORIES.filter(c=>(categorized[c]||[]).length>0).map(c=>(
          <button key={c} className={`btn btn-sm ${filterCat===c?'btn-primary':'btn-secondary'}`} onClick={()=>setFilterCat(c)}
            style={{borderLeft:`3px solid ${CAT_COLORS[c]||'var(--gris-400)'}`}}>{c} ({(categorized[c]||[]).length})</button>
        ))}
      </div>
      <div className="card">
        <div className="card-h"><div><div className="card-t">{filterCat==='Tous'?'Toutes les factures':filterCat}</div><div className="card-st">Données Pennylane</div></div><span className="badge b-ima">Live</span></div>
        <div className="card-b"><div className="tbl"><table>
          <thead><tr><th>Fournisseur</th><th>Catégorie</th><th>N°</th><th>Date</th><th style={{textAlign:'right'}}>HT</th><th style={{textAlign:'right'}}>TTC</th><th>Statut</th></tr></thead>
          <tbody>{(filterCat==='Tous'?seasonInvoices:(categorized[filterCat]||[])).sort((a,b)=>new Date(b.date)-new Date(a.date)).map((inv,i)=>{
            const sid=String(inv.supplier?.id||'');
            const cat=SupplierMap.getCategory(sid);
            return(<tr key={inv.id||i}>
              <td style={{fontWeight:500}}>{SupplierMap.extractName(inv)}</td>
              <td><span style={{display:'inline-block',padding:'2px 8px',borderRadius:4,fontSize:10,fontWeight:500,background:CAT_COLORS[cat]||'var(--gris-400)',color:'white'}}>{cat}</span></td>
              <td style={{fontSize:11}}>{inv.invoice_number||'—'}</td>
              <td style={{fontSize:12}}>{inv.date||'—'}</td>
              <td style={{textAlign:'right',fontSize:12}}>{eur(parseFloat(inv.currency_amount_before_tax||0))}</td>
              <td style={{textAlign:'right',fontWeight:600}}>{eur(parseFloat(inv.amount||0))}</td>
              <td><span className={`badge ${inv.payment_status==='paid'?'b-ok':'b-warn'}`}>{inv.payment_status==='paid'?'Payée':'À traiter'}</span></td>
            </tr>);})}</tbody>
        </table></div></div>
      </div>
    </div>}

    {/* ===== TAB: MAPPING ===== */}
    {tab==='mapping'&&<div>
      {/* Reset + Search bar */}
      <div style={{marginBottom:14,display:'flex',gap:10,alignItems:'center',flexWrap:'wrap'}}>
        <input type="text" className="fi" placeholder="Rechercher fournisseur..." value={mapSearch} onChange={e=>setMapSearch(e.target.value)} style={{flex:1,fontSize:13,minWidth:200}}/>
        {mapSearch&&<button className="btn btn-sm btn-secondary" onClick={()=>setMapSearch('')}>Effacer</button>}
        <button className="btn btn-sm" style={{background:'var(--rouge)',color:'white',whiteSpace:'nowrap'}} onClick={()=>{
          if(confirm('Remettre TOUS les fournisseurs en "Non classé" ? Tu devras les reclasser un par un.')){
            localStorage.removeItem('ima_supplier_map_v2');
            setMapVersion(v=>v+1);
          }
        }}>Remettre à zéro</button>
      </div>

      {/* Quick stats */}
      <div style={{display:'flex',gap:10,marginBottom:14,flexWrap:'wrap',fontSize:12}}>
        {['Food','Bar','Non classé'].map(cat=>{
          const count=supplierGroups.filter(s=>s.cat===cat).length;
          const total=supplierGroups.filter(s=>s.cat===cat).reduce((s,x)=>s+x.totalHT,0);
          return <div key={cat} style={{padding:'8px 14px',borderRadius:8,background:cat==='Non classé'?'var(--rouge-light)':cat==='Food'?'var(--vert-light)':'rgba(88,21,39,.1)',display:'flex',gap:8,alignItems:'center'}}>
            <span style={{fontWeight:600,color:cat==='Non classé'?'var(--rouge)':cat==='Food'?'var(--vert)':'var(--bordeaux)'}}>{cat}</span>
            <span>{count} fournisseurs</span>
            <span style={{fontWeight:600}}>{eur(total)} HT</span>
          </div>;
        })}
      </div>

      {supplierGroups.filter(s=>s.cat==='Non classé').length>0&&!mapSearch&&<div className="alert-i a-err" style={{marginBottom:14}}><I.Warn/><div><div className="at">{supplierGroups.filter(s=>s.cat==='Non classé').length} fournisseur(s) non classé(s)</div><div className="as">Assignez une catégorie avec les boutons rapides Food / Bar ou cliquez "Autre" pour plus d'options.</div></div></div>}

      {/* Search results mode */}
      {mapSearch.length>1&&(()=>{
        const q=mapSearch.toLowerCase();
        // Search in suppliers
        const matchedSuppliers=supplierGroups.filter(s=>s.name.toLowerCase().includes(q));
        // Search in invoices (label, invoice_number, amount)
        const matchedInvoices=allInvoices.filter(inv=>{
          const label=(inv.label||'').toLowerCase();
          const num=(inv.invoice_number||'').toLowerCase();
          const amt=String(inv.amount||'');
          const name=SupplierMap.extractName(inv).toLowerCase();
          return label.includes(q)||num.includes(q)||amt.includes(q)||name.includes(q);
        });
        return(<div>
          {matchedSuppliers.length>0&&<div className="card" style={{marginBottom:14}}>
            <div className="card-h"><div><div className="card-t">Fournisseurs ({matchedSuppliers.length})</div></div></div>
            <div className="card-b"><div className="tbl"><table>
              <thead><tr><th>Fournisseur</th><th>Catégorie</th><th style={{textAlign:'right'}}>Total TTC</th><th style={{textAlign:'center'}}>Nb</th><th>Action</th></tr></thead>
              <tbody>{matchedSuppliers.map(s=>(
                <tr key={s.id} style={{cursor:'pointer'}} onClick={()=>setDetailSupplier(detailSupplier===s.id?null:s.id)}>
                  <td style={{fontWeight:500}}>{s.name}</td>
                  <td><span style={{display:'inline-block',padding:'2px 8px',borderRadius:4,fontSize:10,fontWeight:600,background:CAT_COLORS[s.cat]||'var(--gris-400)',color:'white'}}>{s.cat}</span></td>
                  <td style={{textAlign:'right',fontWeight:600}}>{eur(s.total)}</td>
                  <td style={{textAlign:'center'}}>{s.count}</td>
                  <td>{editingSupplier===s.id?<div style={{display:'flex',gap:3,flexWrap:'wrap'}}>{ALL_CATEGORIES.map(cat=>(<button key={cat} onClick={e=>{e.stopPropagation();handleCategoryChange(s.id,cat);}} style={{fontSize:9,padding:'3px 6px',borderRadius:4,border:'1px solid var(--gris-200)',background:s.cat===cat?CAT_COLORS[cat]||'var(--bordeaux)':'white',color:s.cat===cat?'white':'var(--gris-700)',cursor:'pointer',fontFamily:'inherit'}}>{cat}</button>))}</div>:<button className="btn btn-sm btn-secondary" onClick={e=>{e.stopPropagation();setEditingSupplier(s.id);}}>Modifier</button>}</td>
                </tr>
              ))}</tbody>
            </table></div></div>
          </div>}

          <div className="card" style={{marginBottom:14}}>
            <div className="card-h"><div><div className="card-t">Factures correspondantes ({matchedInvoices.length})</div></div></div>
            <div className="card-b"><div className="tbl"><table style={{fontSize:12}}>
              <thead><tr><th>Fournisseur</th><th>N° Facture</th><th>Label</th><th>Date</th><th style={{textAlign:'right'}}>HT</th><th style={{textAlign:'right'}}>TTC</th><th>Catégorie</th></tr></thead>
              <tbody>{matchedInvoices.sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,100).map((inv,i)=>{
                const sid=String(inv.supplier?.id||'');
                const cat=SupplierMap.getCategory(sid);
                return(<tr key={i}>
                  <td style={{fontWeight:500}}>{SupplierMap.extractName(inv)}</td>
                  <td style={{fontSize:11}}>{inv.invoice_number||'—'}</td>
                  <td style={{fontSize:11,maxWidth:250,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{inv.label||'—'}</td>
                  <td style={{fontSize:11}}>{inv.date||'—'}</td>
                  <td style={{textAlign:'right',fontSize:11}}>{eur(parseFloat(inv.currency_amount_before_tax||0))}</td>
                  <td style={{textAlign:'right',fontWeight:600}}>{eur(parseFloat(inv.amount||0))}</td>
                  <td><span style={{display:'inline-block',padding:'2px 6px',borderRadius:4,fontSize:9,fontWeight:600,background:CAT_COLORS[cat]||'var(--gris-400)',color:'white'}}>{cat}</span></td>
                </tr>);
              })}</tbody>
            </table></div>
            {matchedInvoices.length>100&&<div style={{padding:8,textAlign:'center',fontSize:11,color:'var(--gris-400)'}}>Affichage limité aux 100 premiers résultats</div>}
            {matchedInvoices.length===0&&<div style={{padding:20,textAlign:'center',fontSize:12,color:'var(--gris-400)'}}>Aucun résultat pour "{mapSearch}"</div>}
            </div>
          </div>
        </div>);
      })()}

      {/* Normal grouped view when no search */}
      {!mapSearch&&Object.entries(COST_GROUPS).map(([groupName,groupInfo])=>{
        const groupSuppliers=supplierGroups.filter(s=>groupInfo.cats.includes(s.cat));
        if(groupSuppliers.length===0&&groupName!=='Hors Exploitation')return null;
        const suppliersToShow=groupName==='Hors Exploitation'?
          supplierGroups.filter(s=>groupInfo.cats.includes(s.cat)):groupSuppliers;
        if(suppliersToShow.length===0)return null;
        return(<div className="card" key={groupName} style={{marginBottom:14}}>
          <div className="card-h"><div>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <div style={{width:4,height:20,borderRadius:2,background:groupInfo.color}}/>
              <div className="card-t">{groupName}</div>
            </div>
            <div className="card-st">{suppliersToShow.length} fournisseur(s)</div>
          </div></div>
          <div className="card-b"><div className="tbl"><table>
            <thead><tr><th style={{textAlign:'left'}}>Fournisseur</th><th>Catégorie</th><th style={{textAlign:'right'}}>Total HT</th><th style={{textAlign:'right'}}>Total TTC</th><th style={{textAlign:'center'}}>Nb</th><th style={{minWidth:260}}>Classement rapide</th></tr></thead>
            <tbody>{suppliersToShow.sort((a,b)=>a.cat==='Non classé'?-1:b.cat==='Non classé'?1:Math.abs(b.total)-Math.abs(a.total)).map(s=>{
              const quickCats=['Food','Bar','Hygiène & Entretien','Matériel & Équipement','Énergie & Fluides','Travaux & Maintenance','Communication & Marketing','IT & Logiciels','Administratif & Juridique','Loyer & Charges','Blanchisserie','Transport & Véhicules','Assurances','Divers','Non classé'];
              const isOpen=detailSupplier===s.id;
              const invs=isOpen?seasonInvoices.filter(inv=>String(inv.supplier?.id||'')===s.id).sort((a,b)=>new Date(b.date)-new Date(a.date)):[];
              const rows=[];
              rows.push(<tr key={s.id} style={{background:s.cat==='Non classé'?'rgba(220,38,38,.04)':'transparent',cursor:'pointer'}} onClick={()=>setDetailSupplier(isOpen?null:s.id)}>
                <td style={{fontWeight:500}}>{s.name} <span style={{fontSize:9,color:'var(--gris-400)'}}>{isOpen?'▼':'▶'}</span></td>
                <td><span style={{display:'inline-block',padding:'2px 8px',borderRadius:4,fontSize:10,fontWeight:600,background:CAT_COLORS[s.cat]||'var(--gris-400)',color:'white'}}>{s.cat}</span></td>
                <td style={{textAlign:'right',fontWeight:500,fontSize:12}}>{eur(s.totalHT)}</td>
                <td style={{textAlign:'right',color:'var(--gris-400)',fontSize:12}}>{eur(s.total)}</td>
                <td style={{textAlign:'center'}}>{s.count}</td>
                <td>
                  {editingSupplier===s.id?
                    <div style={{display:'flex',gap:3,flexWrap:'wrap'}}>
                      {quickCats.map(cat=>(
                        <button key={cat} onClick={e=>{e.stopPropagation();handleCategoryChange(s.id,cat);}}
                          style={{fontSize:9,padding:'3px 6px',borderRadius:4,border:'1px solid var(--gris-200)',background:s.cat===cat?CAT_COLORS[cat]||'var(--bordeaux)':'white',
                            color:s.cat===cat?'white':'var(--gris-700)',cursor:'pointer',fontFamily:'inherit',fontWeight:s.cat===cat?600:400}}>
                          {cat}
                        </button>
                      ))}
                    </div>
                    :<div style={{display:'flex',gap:4}} onClick={e=>e.stopPropagation()}>
                      <button className="btn btn-sm" style={{background:s.cat==='Food'?'var(--vert)':'white',color:s.cat==='Food'?'white':'var(--vert)',border:'1px solid var(--vert)',fontSize:10,padding:'3px 10px'}} onClick={()=>handleCategoryChange(s.id,'Food')}>Food</button>
                      <button className="btn btn-sm" style={{background:s.cat==='Bar'?'var(--bordeaux)':'white',color:s.cat==='Bar'?'white':'var(--bordeaux)',border:'1px solid var(--bordeaux)',fontSize:10,padding:'3px 10px'}} onClick={()=>handleCategoryChange(s.id,'Bar')}>Bar</button>
                      <button className="btn btn-sm btn-secondary" style={{fontSize:10,padding:'3px 8px'}} onClick={()=>setEditingSupplier(s.id)}>Autre ▾</button>
                    </div>
                  }
                </td>
              </tr>);
              if(isOpen){
                invs.forEach((inv,i)=>{
                  rows.push(<tr key={s.id+'_inv_'+i} style={{background:'var(--gris-50)',fontSize:11}}>
                    <td style={{paddingLeft:24,color:'var(--gris-600)'}}>{inv.invoice_number||'—'}</td>
                    <td colSpan={2} style={{maxWidth:200,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',color:'var(--gris-500)',fontSize:10}}>{inv.label||'—'}</td>
                    <td style={{textAlign:'right',fontSize:11}}>{inv.date||'—'}</td>
                    <td style={{textAlign:'right',fontWeight:500}}>{eur(parseFloat(inv.currency_amount_before_tax||0))}</td>
                    <td style={{textAlign:'right',color:'var(--gris-400)'}}>{eur(parseFloat(inv.amount||0))}</td>
                  </tr>);
                });
                rows.push(<tr key={s.id+'_total'} style={{background:'var(--gris-100)',fontWeight:700,fontSize:11}}>
                  <td style={{paddingLeft:24}}>TOTAL {s.name}</td>
                  <td colSpan={2}/>
                  <td/>
                  <td style={{textAlign:'right'}}>{eur(invs.reduce((sum,i)=>sum+parseFloat(i.currency_amount_before_tax||0),0))}</td>
                  <td style={{textAlign:'right',color:'var(--bordeaux)'}}>{eur(invs.reduce((sum,i)=>sum+parseFloat(i.amount||0),0))}</td>
                </tr>);
              }
              return rows;
              })}</tbody>
          </table></div>
          </div>
        </div>);
      })}
    </div>}
    </div>}

    {!loading&&!loaded&&<div className="alert-i a-warn"><I.Warn/><div><div className="at">Connexion Pennylane requise</div><div className="as">Configurez votre token API dans Administration → Configuration Pennylane</div></div></div>}
  </div>);
}

// ===== STAFF =====
function StaffPage(){
  const[tab,setTab]=useState('paie');
  const[showModal,setShowModal]=useState(false);
  const[editingId,setEditingId]=useState(null);
  const emptyEmp={nom:'',poste:'Serveur',section:'salle',tipCategory:'FLOOR',points:4,contrat:'CDI',tel:'',dateEntree:new Date().toLocaleDateString('fr-FR'),tips:true,coutBrut:0,heures:0,extras:0};
  const[newEmp,setNewEmp]=useState(emptyEmp);
  const[ver,setVer]=useState(0);
  const team=StaffRegistry.getActive();
  const tipsTeam=StaffRegistry.getTipsEligible();
  const pCtx=usePeriod();

  // Payroll data
  const[payMonth,setPayMonth]=useState('jan');

  const deptTotals=PayrollService.getDeptTotals(payroll);

  const caTotal=pCtx.trivecPeriod.total;
  const caSource=_staffIsSeason?'Saison Trivec':pCtx.trivecPeriod.days>0?`Trivec (${pCtx.trivecPeriod.days}j)`:'—';
  const msDisplay=_staffIsSeason?pCtx.msActive:pCtx.msProrata;
  const staffCostPct=caTotal>0?Math.round(msDisplay/caTotal*1000)/10:0;
  const evo=PayrollService.getEvolution();
  const upcoming=PayrollService.getUpcomingDepartures();
  const sdtcList=PayrollService.getSDTC();
  const deptColors={cuisine:'var(--vert)',salle:'var(--bordeaux)',bar:'var(--orange)',direction:'var(--bleu)'};
  const deptLabels={cuisine:'Cuisine',salle:'Salle',bar:'Bar',direction:'Direction'};
  const statusColors={'actif':'var(--vert)','sdtc':'var(--rouge)','sdtc-fev':'var(--orange)'};
  const statusLabels={'actif':'Actif','sdtc':'Sorti Jan','sdtc-fev':'Sort Fév'};

  const handleAddOrSave=()=>{
    if(!newEmp.nom)return;
    if(editingId){
      StaffRegistry.update(editingId,newEmp);
      setEditingId(null);
    }else{
      StaffRegistry.add(newEmp);
    }
    setNewEmp({...emptyEmp});
    setVer(v=>v+1);
    setTab('equipe');
  };

  const handleEditEmployee=(emp)=>{
    setEditingId(emp.id);
    setNewEmp({nom:emp.nom,poste:emp.poste,section:emp.section||'salle',tipCategory:emp.tipCategory||'FLOOR',points:emp.points||3,contrat:emp.contrat||'CDI',tel:emp.tel||'',dateEntree:emp.dateEntree||'',tips:emp.tips!==false,coutBrut:emp.coutBrut||0,heures:emp.heures||0,extras:emp.extras||0});
    setTab('ajouter');
  };

  const handleCancelEdit=()=>{
    setEditingId(null);
    setNewEmp({...emptyEmp});
  };

  const handleDeactivate=(id)=>{
    if(confirm('Marquer comme inactif ?'))StaffRegistry.deactivate(id);
    setVer(v=>v+1);
  };

  const totalMasseS=payTotals.totalCoutGlobal||team.reduce((s,e)=>s+(e.coutBrut||0),0);
  const totalHeures=payTotals.totalHeures||team.reduce((s,e)=>s+(e.heures||0),0);
  const totalExtras=team.reduce((s,e)=>s+(e.extras||0),0);
  const salleCount=(deptTotals.salle?.count||0);
  const cuisineCount=(deptTotals.cuisine?.count||0);
  const barCount=(deptTotals.bar?.count||0);

  const sectionColors={salle:'var(--bordeaux)',cuisine:'var(--vert)'};

  return(<div className="fin">
