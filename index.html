}

// ===== TRESORERIE =====
function Tresorerie(){
  const pCtx=usePeriod();
  const trivec=typeof TRIVEC_SEASON!=='undefined'?TRIVEC_SEASON:null;
  const invCtx=useInvoices();
  const invoices=invCtx.invoices;
  const loading=invCtx.loading;

  // --- DONNÉES DE BASE ---
  const isSeason=pCtx.trivecPeriod._fromSeason||false;

  // CA TTC encaissé (ce que les clients ont réellement payé)
  const encaissementsTTC=trivec?trivec.paiements.total:0;
  // CA TTC net (ventes nettes, hors interne/cash-in)
  const caTTC=trivec?trivec.ventesNet:0;
  // CA HT — calculé depuis la TVA Trivec (taux10.ht + taux20.ht)
  const caHT=trivec&&trivec.tva?(trivec.tva.taux10.ht+trivec.tva.taux20.ht):0;

  // Paiements par moyen
  const paymentBreakdown=trivec&&trivec.paiements&&trivec.paiements.details?
    trivec.paiements.details.reduce((acc,p)=>{acc[p.mode]=p.montant;return acc;},{}):{};

  // --- CHARGES ---
  // Achats fournisseurs (Pennylane) — filtrés à la période saison (exclut pré-ouverture nov)
  const _S_pl=typeof TRIVEC_SEASON!=='undefined'?TRIVEC_SEASON:null;
  const seasonFrom=_S_pl?_S_pl.periode.from.split('/').reverse().join('-'):'2025-12-01';
  const seasonInvPL=useMemo(()=>invoices.filter(function(inv){return inv.date&&inv.date>=seasonFrom;}),[invoices,seasonFrom]);
  const totals=useMemo(()=>SupplierMap.getTotals(seasonInvPL),[seasonInvPL]);
  const totalAchats=useMemo(()=>Object.values(totals).reduce((s,v)=>s+v,0),[totals]);
  const foodTotal=totals['Food']||0;
  const barTotal=totals['Bar']||0;
  const otherCharges=totalAchats-foodTotal-barTotal;

  // Masse salariale
  const staffCost=isSeason?pCtx.msActive:pCtx.msProrata;

  // --- TVA NETTE ---
  // TVA collectée (sur les ventes)
  const tvaCollectee=trivec&&trivec.tva?(trivec.tva.taux10.tva+trivec.tva.taux20.tva):0;
  // TVA déductible (estimée sur les achats HT)
  // Food : TVA 5.5% sur HT
  // Bar/Autres : TVA 20% sur HT
  const tvaDeductFood=Math.round(foodTotal*0.055);
  const tvaDeductBar=Math.round(barTotal*0.20);
  const tvaDeductAutres=Math.round(otherCharges*0.20);
  const tvaDeductible=tvaDeductFood+tvaDeductBar+tvaDeductAutres;
  // TVA nette à reverser = collectée - déductible
  const tvaNette=tvaCollectee-tvaDeductible;

  // --- RÉSULTAT D'EXPLOITATION ---
  // totalAchats est déjà HT (getTotals utilise currency_amount_before_tax)
  const resultatExploitation=caHT-totalAchats-staffCost;

  // --- TOP FOURNISSEURS ---
  const topSuppliers=useMemo(()=>{
    const map={};
    invoices.forEach(inv=>{
      const name=SupplierMap.extractName(inv);
      if(!map[name])map[name]={name,total:0,count:0};
      const ht=parseFloat(inv.currency_amount_before_tax||0);
      const ttc=parseFloat(inv.amount||0);
      map[name].total+=(ht||ttc);
      map[name].count++;
    });
    return Object.values(map).sort((a,b)=>Math.abs(b.total)-Math.abs(a.total)).slice(0,10);
  },[invoices]);

  const maxSupplier=topSuppliers.length>0?Math.abs(topSuppliers[0].total):1;

  return(<div className="fin">
    {loading&&<div style={{textAlign:'center',padding:20}}><div className="spinner" style={{width:20,height:20}}/><div style={{fontSize:12,color:'var(--gris-400)',marginTop:8}}>Chargement Pennylane...</div></div>}

    <div className="kpi-g">
      <div className="kpi"><div className="kpi-label">CA HT</div><div className="kpi-val" style={{color:'var(--vert)'}}>{eur(caHT)}</div><div className="kpi-chg pos">TTC net: {eur(caTTC)} — Encaissé: {eur(encaissementsTTC)}</div></div>
      <div className="kpi"><div className="kpi-label">Total Charges HT</div><div className="kpi-val" style={{color:'var(--rouge)'}}>{eur(totalAchats+staffCost)}</div><div className="kpi-chg neg">Achats HT {eur(totalAchats)} + MS {eur(staffCost)}</div></div>
      <div className="kpi"><div className="kpi-label">Résultat d'Exploitation</div><div className="kpi-val" style={{color:resultatExploitation>=0?'var(--vert)':'var(--rouge)'}}>{eur(resultatExploitation)}</div><div className="kpi-chg" style={{background:resultatExploitation>=0?'var(--vert-light)':'var(--rouge-light)',color:resultatExploitation>=0?'var(--vert)':'var(--rouge)'}}>{caHT>0?Math.round(resultatExploitation/caHT*100)+'% du CA':''}</div></div>
      <div className="kpi"><div className="kpi-label">TVA Nette à reverser</div><div className="kpi-val" style={{color:'var(--orange)'}}>{eur(tvaNette)}</div><div className="kpi-chg neu">Collectée {eur(tvaCollectee)} - Déductible {eur(tvaDeductible)}</div></div>
    </div>

    <div className="cg">
      <div className="card">
        <div className="card-h"><div><div className="card-t">Compte de résultat simplifié</div><div className="card-st">Saison {trivec?trivec.periode.label:''}</div></div></div>
        <div className="card-b"><div className="tbl"><table>
          <thead><tr><th>Poste</th><th style={{textAlign:'right'}}>Montant</th><th style={{textAlign:'right'}}>% CA</th></tr></thead>
          <tbody>
            <tr style={{background:'var(--vert-light)'}}><td style={{fontWeight:700}}>CA Net HT</td><td style={{textAlign:'right',fontWeight:700,color:'var(--vert)'}}>{eur(caHT)}</td><td style={{textAlign:'right'}}>100%</td></tr>
            <tr><td style={{paddingLeft:20}}>Achats Food</td><td style={{textAlign:'right',color:'var(--rouge)'}}>{eur(foodTotal)}</td><td style={{textAlign:'right'}}>{caHT>0?Math.round(foodTotal/caHT*100)+'%':'—'}</td></tr>
            <tr><td style={{paddingLeft:20}}>Achats Bar</td><td style={{textAlign:'right',color:'var(--rouge)'}}>{eur(barTotal)}</td><td style={{textAlign:'right'}}>{caHT>0?Math.round(barTotal/caHT*100)+'%':'—'}</td></tr>
            <tr><td style={{paddingLeft:20}}>Autres charges</td><td style={{textAlign:'right',color:'var(--rouge)'}}>{eur(otherCharges)}</td><td style={{textAlign:'right'}}>{caHT>0?Math.round(otherCharges/caHT*100)+'%':'—'}</td></tr>
            <tr style={{borderTop:'2px solid var(--gris-200)'}}><td style={{fontWeight:600}}>Total Achats</td><td style={{textAlign:'right',fontWeight:600,color:'var(--rouge)'}}>{eur(totalAchats)}</td><td style={{textAlign:'right',fontWeight:600}}>{caHT>0?Math.round(totalAchats/caHT*100)+'%':'—'}</td></tr>
            <tr><td style={{fontWeight:600}}>Masse Salariale</td><td style={{textAlign:'right',fontWeight:600,color:'var(--orange)'}}>{eur(staffCost)}</td><td style={{textAlign:'right',fontWeight:600}}>{caHT>0?Math.round(staffCost/caHT*100)+'%':'—'}</td></tr>
            <tr style={{background:resultatExploitation>=0?'var(--vert-light)':'var(--rouge-light)',borderTop:'2px solid var(--gris-300)'}}><td style={{fontWeight:700,fontSize:14}}>Résultat d'Exploitation</td><td style={{textAlign:'right',fontWeight:700,fontSize:14,color:resultatExploitation>=0?'var(--vert)':'var(--rouge)'}}>{eur(resultatExploitation)}</td><td style={{textAlign:'right',fontWeight:700}}>{caHT>0?Math.round(resultatExploitation/caHT*100)+'%':'—'}</td></tr>
          </tbody>
        </table></div></div>
      </div>

      <div className="card">
        <div className="card-h"><div><div className="card-t">TVA</div><div className="card-st">Estimation de la TVA nette</div></div></div>
        <div className="card-b"><div className="tbl"><table>
          <thead><tr><th>Poste</th><th style={{textAlign:'right'}}>Montant</th></tr></thead>
          <tbody>
            <tr><td>TVA collectée 10% (Nourriture)</td><td style={{textAlign:'right'}}>{trivec&&trivec.tva?eur(trivec.tva.taux10.tva):'—'}</td></tr>
            <tr><td>TVA collectée 20% (Boissons)</td><td style={{textAlign:'right'}}>{trivec&&trivec.tva?eur(trivec.tva.taux20.tva):'—'}</td></tr>
            <tr style={{fontWeight:600,borderTop:'1px solid var(--gris-200)'}}><td>Total TVA collectée</td><td style={{textAlign:'right'}}>{eur(tvaCollectee)}</td></tr>
            <tr style={{marginTop:8}}><td>TVA déductible Food (5.5%)</td><td style={{textAlign:'right',color:'var(--vert)'}}>{eur(tvaDeductFood)}</td></tr>
            <tr><td>TVA déductible Bar (20%)</td><td style={{textAlign:'right',color:'var(--vert)'}}>{eur(tvaDeductBar)}</td></tr>
            <tr><td>TVA déductible Autres (20%)</td><td style={{textAlign:'right',color:'var(--vert)'}}>{eur(tvaDeductAutres)}</td></tr>
            <tr style={{fontWeight:600,borderTop:'1px solid var(--gris-200)'}}><td>Total TVA déductible</td><td style={{textAlign:'right',color:'var(--vert)'}}>{eur(tvaDeductible)}</td></tr>
            <tr style={{fontWeight:700,background:'var(--orange-light)',borderTop:'2px solid var(--gris-300)'}}><td>TVA Nette à reverser</td><td style={{textAlign:'right',color:'var(--orange)'}}>{eur(tvaNette)}</td></tr>
          </tbody>
        </table></div></div>
      </div>
    </div>

    <div className="cg">
      <div className="card">
        <div className="card-h"><div><div className="card-t">Paiements par moyen</div><div className="card-st">Répartition des encaissements TTC</div></div></div>
        <div className="card-b">
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(140px,1fr))',gap:10}}>
            {Object.entries(paymentBreakdown).filter(function(e){return e[1]>0;}).map(function(e){return(<div key={e[0]} style={{background:'var(--gris-50)',padding:12,borderRadius:8,textAlign:'center',border:'1px solid var(--gris-200)'}}>
              <div style={{fontSize:11,color:'var(--gris-500)',fontWeight:600,marginBottom:4}}>{e[0]}</div>
              <div style={{fontSize:16,fontWeight:700,color:'var(--bordeaux)'}}>{eur(e[1])}</div>
              <div style={{fontSize:10,color:'var(--gris-400)',marginTop:4}}>{encaissementsTTC>0?((e[1]/encaissementsTTC)*100).toFixed(1)+'%':''}</div>
            </div>);})}
          </div>
        </div>
      </div>

      <div className="card">
        <div className="card-h"><div><div className="card-t">Top 10 Fournisseurs</div><div className="card-st">Plus gros postes de dépenses</div></div></div>
        <div className="card-b"><div className="tbl"><table>
          <thead><tr><th>Fournisseur</th><th style={{textAlign:'right'}}>Montant</th><th style={{textAlign:'right'}}>Nb</th><th style={{width:'30%'}}></th></tr></thead>
          <tbody>{topSuppliers.map(function(s,i){return(
            <tr key={i}><td style={{fontWeight:500}}>{s.name}</td><td style={{textAlign:'right',fontWeight:600}}>{eur(Math.abs(s.total))}</td><td style={{textAlign:'right'}}>{s.count}</td>
            <td><div className="pbar"><div className="pfill" style={{width:(Math.abs(s.total)/maxSupplier*100)+'%',background:'var(--bordeaux)'}}/></div></td></tr>
          );})}</tbody>
        </table></div></div>
      </div>
    </div>
  </div>);
}

function Productivite(){
  const pCtx=usePeriod();
  const trivec=typeof TRIVEC_SEASON!=='undefined'?TRIVEC_SEASON:null;
  const staffData=PayrollService.getData('dec')||[];

  const totalCA=trivec?trivec.ventesNet:0;
  const couverts=trivec?trivec.couverts:0;
  const totalHeures=staffData.reduce((s,e)=>s+(e.heures||0),0);
  const totalCost=pCtx.msProrata;

  // Aggregate by department
  const deptMap={};
  staffData.forEach(e=>{
    const d=e.dept||'Non spécifié';
    if(!deptMap[d]){deptMap[d]={dept:d,count:0,heures:0,brut:0,cost:0};};
    deptMap[d].count++;
    deptMap[d].heures+=e.heures||0;
    deptMap[d].brut+=e.brut||0;
    deptMap[d].cost+=e.coutGlobal||0;
  });
  const deptList=Object.values(deptMap);

  return(<div className="fin">
    <div className="kpi-g">
      <div className="kpi"><div className="kpi-label">CA / Employé</div><div className="kpi-val">{eur(totalCA/(staffData.length||1))}</div><div className="kpi-chg pos">CA par tête</div></div>
      <div className="kpi"><div className="kpi-label">CA / Heure travaillée</div><div className="kpi-val">{eur(totalCA/(totalHeures||1))}</div><div className="kpi-chg pos">{fmt(totalHeures)} heures</div></div>
      <div className="kpi"><div className="kpi-label">Couverts / Serveur</div><div className="kpi-val">{couverts>0?fmt(Math.round(couverts/(staffData.length||1))):'—'}</div><div className="kpi-chg pos">Productivité salle</div></div>
      <div className="kpi"><div className="kpi-label">Coût / Couvert</div><div className="kpi-val">{couverts>0?eur(totalCost/couverts):'—'}</div><div className="kpi-chg neu">Ratio de rentabilité</div></div>

      <div className="card-h"><div><div className="card-t">Productivité par département</div><div className="card-st">Analyse de performance par équipe</div></div></div>
      <div className="card-b"><div className="tbl"><table>
        <thead><tr><th>Département</th><th style={{textAlign:'right'}}>Effectif</th><th style={{textAlign:'right'}}>Heures</th><th style={{textAlign:'right'}}>Coût total</th><th style={{textAlign:'right'}}>Coût/h</th><th style={{textAlign:'right'}}>Coût/CA</th></tr></thead>
        <tbody>{deptList.map((d,i)=>(
          <tr key={i}>
            <td style={{fontWeight:600}}>{d.dept}</td>
            <td style={{textAlign:'right'}}>{d.count}</td>
            <td style={{textAlign:'right'}}>{fmt(Math.round(d.heures))}</td>
            <td style={{textAlign:'right',fontWeight:600}}>{eur(d.cost)}</td>
            <td style={{textAlign:'right'}}>{eur(d.heures>0?d.cost/d.heures:0)}</td>
            <td style={{textAlign:'right'}}>{totalCA>0?(d.cost/totalCA*100).toFixed(1)+'%':'—'}</td>
          </tr>
        ))}</tbody>
      </table></div></div>
    </div>

    {/* Ratio CA/heure et staffing optimal */}
    <div className="card" style={{marginBottom:14}}>
      <div className="card-h"><div><div className="card-t">Productivité €/heure & Staffing Optimal</div><div className="card-st">CA par heure travaillée et recommandation effectif par jour</div></div></div>
      <div className="card-b">
        {(function(){
          const effectif=PayrollService.getEffectifActif();
          const msActive=PayrollService.getMasseSalarialeActive();
          const hoursPerMonth=151;
          const totalHours=effectif*hoursPerMonth*3;
          const caPerHour=totalHours>0?totalCA/totalHours:0;
          const staffCostPerHour=totalHours>0?msActive/totalHours:0;
          const prodRatio=staffCostPerHour>0?caPerHour/staffCostPerHour:0;

          return React.createElement(React.Fragment,null,
            React.createElement('div',{className:'kpi-g'},
              React.createElement('div',{className:'kpi'},
                React.createElement('div',{className:'kpi-label'},'CA / heure travaillée'),
                React.createElement('div',{className:'kpi-val',style:{color:'var(--bordeaux)'}},eur(caPerHour)),
                React.createElement('div',{className:'kpi-chg neu'},'Objectif : ≥ 80€/h')
              ),
              React.createElement('div',{className:'kpi'},
                React.createElement('div',{className:'kpi-label'},'Coût staff / heure'),
                React.createElement('div',{className:'kpi-val'},eur(staffCostPerHour)),
                React.createElement('div',{className:'kpi-chg neu'},'Masse salariale ÷ heures')
              ),
              React.createElement('div',{className:'kpi'},
                React.createElement('div',{className:'kpi-label'},'Ratio productivité'),
                React.createElement('div',{className:'kpi-val',style:{color:prodRatio>=2.5?'var(--vert)':prodRatio>=2?'var(--orange)':'var(--rouge)'}},prodRatio.toFixed(1)+'x'),
                React.createElement('div',{className:'kpi-chg neu'},'CA÷Coût staff — Objectif ≥ 2.5x')
              )
            )
          );
        })()}
      </div>
    </div>
  </div>);
}

function MenuEngineering(){
  const[tab,setTab]=useState('food');

  // Aggregate Trivec products from all days
  const menuItems=useMemo(function(){
    const data=TrivecService._getData();
    const assorts=data.assortiments||{};
    const pMap={};
    for(var ds in assorts){
      if(!assorts.hasOwnProperty(ds))continue;
      var prods=assorts[ds].products||[];
      prods.forEach(function(p){
        var k=p.nom;
        if(!pMap[k])pMap[k]={nom:p.nom,cat1:p.categorie1||'',cat2:p.categorie2||'',cat3:p.categorie3||'',totalQty:0,totalCA:0};
        pMap[k].totalQty+=p.quantite||0;
        pMap[k].totalCA+=p.prix||0;
      });
    }
    // Merge with RecipeCosts for food cost per unit and MENU_PRICES
    return Object.values(pMap).filter(function(p){return p.totalQty>0;}).map(function(p){
      var prixMoyenTrivec=p.totalCA/p.totalQty;
      var costUnit=RecipeCosts[p.nom];
      if(costUnit===undefined||costUnit===null)costUnit=null;
      // Look up menu price (TTC)
      var mp=MENU_PRICES[p.nom]||null;
      var prixCarteTTC=mp?mp.prix:null;
      var tvaRate=mp?mp.tva:10;
      var prixCarteHT=prixCarteTTC&&prixCarteTTC>0?prixCarteTTC/(1+tvaRate/100):null;
      // Prix de vente effectif = prix carte HT si disponible, sinon prix moyen Trivec
      // Le prix carte est plus fiable (Trivec split les combos et fausse le prix moyen)
      var prixVente=prixCarteHT||prixMoyenTrivec;
      var marginPct=costUnit!==null&&prixVente>0?((prixVente-costUnit)/prixVente)*100:null;
      var totalCost=costUnit!==null?costUnit*p.totalQty:null;
      return{nom:p.nom,cat:p.cat1,cat2:p.cat2,qty:p.totalQty,ca:p.totalCA,prixMoyen:prixMoyenTrivec,prixVente:prixVente,costUnit:costUnit,totalCost:totalCost,marginPct:marginPct,prixCarteTTC:prixCarteTTC,prixCarteHT:prixCarteHT,tvaRate:tvaRate};
    });
  },[]);

  // Filter by tab
  var isFood=function(item){return item.cat==='FOOD'||item.cat==='Nourriture'||item.cat==='Food'||item.cat==='RESTAURANT'||item.cat==='NOURRITURE';};
  var isBar=function(item){return !isFood(item)&&item.cat!=='TIPS'&&item.nom!=='TIPS';};
  var filtered=tab==='food'?menuItems.filter(isFood):tab==='bar'?menuItems.filter(isBar):menuItems;
  // Only items with known cost for BCG
  var withCost=filtered.filter(function(p){return p.marginPct!==null;});
  var noCost=filtered.filter(function(p){return p.marginPct===null;});

  // BCG Matrix classification (only on items with known costs)
  var avgQty=withCost.length>0?withCost.reduce(function(s,p){return s+p.qty;},0)/withCost.length:1;
  var avgMargin=withCost.length>0?withCost.reduce(function(s,p){return s+p.marginPct;},0)/withCost.length:0;

  var classify=function(item){
    if(item.marginPct===null)return'N/A';
    var highQty=item.qty>=avgQty;
    var highMargin=item.marginPct>=avgMargin;
    if(highQty&&highMargin)return'Star';
    if(!highQty&&highMargin)return'Puzzle';
    if(highQty&&!highMargin)return'Cheval';
    return'Dog';
  };

  var bcgColors={'Star':'var(--vert)','Puzzle':'var(--orange)','Cheval':'var(--bleu)','Dog':'var(--rouge)','N/A':'var(--gris-400)'};
  var bestMargin=withCost.slice().sort(function(a,b){return b.marginPct-a.marginPct;}).slice(0,10);
  var worstMargin=withCost.slice().sort(function(a,b){return a.marginPct-b.marginPct;}).slice(0,10);
  var topCA=filtered.slice().sort(function(a,b){return b.ca-a.ca;}).slice(0,15);

  var totalItems=filtered.length;
  var totalCA=filtered.reduce(function(s,p){return s+p.ca;},0);
  var stars=withCost.filter(function(p){return classify(p)==='Star';});
  var puzzles=withCost.filter(function(p){return classify(p)==='Puzzle';});
  var chevaux=withCost.filter(function(p){return classify(p)==='Cheval';});
  var dogs=withCost.filter(function(p){return classify(p)==='Dog';});

  return(<div className="fin">
    <div className="tabs">
      <div className={'tab '+(tab==='food'?'active':'')} onClick={function(){setTab('food');}}>Food</div>
      <div className={'tab '+(tab==='bar'?'active':'')} onClick={function(){setTab('bar');}}>Bar</div>
      <div className={'tab '+(tab==='all'?'active':'')} onClick={function(){setTab('all');}}>Tous</div>
    </div>

    <div style={{background:'var(--cream,#fdf6f0)',border:'1px solid #e8d5c4',borderRadius:8,padding:'10px 14px',marginBottom:14,fontSize:11,color:'var(--gris-600)'}}>
      <strong>Calcul des marges :</strong> Le prix de vente utilisé est le <strong>prix carte HT</strong> quand il est disponible (priorité), sinon le prix moyen Trivec. Les mezze individuels sont valorisés à 9,33€ TTC (= 28€ / 3 du combo). * = prix carte TTC. Les spiritueux servis avec mixers offerts (sauf Red Bull) ont une TVA mixte.
    </div>

    <div className="kpi-g">
      <div className="kpi"><div className="kpi-label">Articles vendus</div><div className="kpi-val">{totalItems}</div><div className="kpi-chg neu">{withCost.length} avec coût connu</div></div>
      <div className="kpi"><div className="kpi-label">CA Total</div><div className="kpi-val" style={{color:'var(--bordeaux)'}}>{eur(totalCA)}</div><div className="kpi-chg pos">{tab==='food'?'Nourriture':tab==='bar'?'Boissons':'Tous'}</div></div>
      <div className="kpi"><div className="kpi-label">Marge moyenne</div><div className="kpi-val" style={{color:avgMargin>=60?'var(--vert)':'var(--orange)'}}>{avgMargin.toFixed(1)}%</div><div className="kpi-chg neu">Sur articles avec coût</div></div>
      <div className="kpi"><div className="kpi-label">Sans coût connu</div><div className="kpi-val" style={{color:noCost.length>0?'var(--orange)':'var(--vert)'}}>{noCost.length}</div><div className="kpi-chg neu">À renseigner dans RecipeCosts</div></div>
    </div>

    <div className="card">
      <div className="card-h"><div><div className="card-t">Matrice BCG</div><div className="card-st">Classification par marge et volume — seuil: marge {avgMargin.toFixed(0)}%, volume {Math.round(avgQty)} unités</div></div></div>
      <div className="card-b">
        {withCost.length===0&&<div style={{textAlign:'center',padding:30,color:'var(--gris-400)'}}>Aucun article avec coût connu. Importez des données Trivec (Assortiments) et vérifiez RecipeCosts.</div>}
        {withCost.length>0&&<div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:20}}>
          <div style={{background:'var(--vert-light)',padding:16,borderRadius:8,borderLeft:'4px solid var(--vert)'}}>
            <div style={{fontSize:11,color:'var(--vert)',fontWeight:600,marginBottom:4}}>STARS — Marge haute + Volume haut</div>
            <div style={{fontSize:20,fontWeight:700,color:'var(--vert)'}}>{stars.length} articles</div>
            <div style={{fontSize:10,color:'var(--vert)',marginTop:4}}>{stars.length>0?stars.slice(0,3).map(function(s){return s.nom;}).join(', '):''}</div>
          </div>
          <div style={{background:'var(--orange-light)',padding:16,borderRadius:8,borderLeft:'4px solid var(--orange)'}}>
            <div style={{fontSize:11,color:'var(--orange)',fontWeight:600,marginBottom:4}}>PUZZLES — Marge haute + Volume bas</div>
            <div style={{fontSize:20,fontWeight:700,color:'var(--orange)'}}>{puzzles.length} articles</div>
            <div style={{fontSize:10,color:'var(--orange)',marginTop:4}}>{puzzles.length>0?puzzles.slice(0,3).map(function(s){return s.nom;}).join(', '):''}</div>
          </div>
          <div style={{background:'var(--bleu-light)',padding:16,borderRadius:8,borderLeft:'4px solid var(--bleu)'}}>
            <div style={{fontSize:11,color:'var(--bleu)',fontWeight:600,marginBottom:4}}>CHEVAUX — Marge basse + Volume haut</div>
            <div style={{fontSize:20,fontWeight:700,color:'var(--bleu)'}}>{chevaux.length} articles</div>
            <div style={{fontSize:10,color:'var(--bleu)',marginTop:4}}>{chevaux.length>0?chevaux.slice(0,3).map(function(s){return s.nom;}).join(', '):''}</div>
          </div>
          <div style={{background:'var(--rouge-light)',padding:16,borderRadius:8,borderLeft:'4px solid var(--rouge)'}}>
            <div style={{fontSize:11,color:'var(--rouge)',fontWeight:600,marginBottom:4}}>DOGS — Marge basse + Volume bas</div>
            <div style={{fontSize:20,fontWeight:700,color:'var(--rouge)'}}>{dogs.length} articles</div>
            <div style={{fontSize:10,color:'var(--rouge)',marginTop:4}}>{dogs.length>0?dogs.slice(0,3).map(function(s){return s.nom;}).join(', '):''}</div>
          </div>
        </div>}
      </div>
    </div>

    <div className="card">
      <div className="card-h"><div><div className="card-t">Top 15 articles par CA</div><div className="card-st">Tous articles vendus</div></div></div>
      <div className="card-b"><div className="tbl"><table>
        <thead><tr><th>Article</th><th>Catégorie</th><th style={{textAlign:'right'}}>Qty</th><th style={{textAlign:'right'}}>CA</th><th style={{textAlign:'right'}}>Prix Carte</th><th style={{textAlign:'right'}}>Prix Trivec</th><th style={{textAlign:'right'}}>Coût unit.</th><th style={{textAlign:'right'}}>Marge %</th><th>BCG</th></tr></thead>
        <tbody>{topCA.map(function(p,i){return(
          <tr key={i}><td style={{fontWeight:500}}>{p.nom}</td><td><span className="badge b-ima" style={{fontSize:9}}>{p.cat}</span></td>
          <td style={{textAlign:'right'}}>{fmt(p.qty)}</td><td style={{textAlign:'right',fontWeight:600}}>{eur(p.ca)}</td>
          <td style={{textAlign:'right',color:p.prixCarteTTC?'var(--bordeaux)':'var(--gris-300)'}}>{p.prixCarteTTC?eur(p.prixCarteTTC)+'*':'—'}</td>
          <td style={{textAlign:'right',fontSize:11,color:'var(--gris-500)'}}>{eur(p.prixMoyen)}</td>
          <td style={{textAlign:'right'}}>{p.costUnit!==null?eur(p.costUnit):'—'}</td>
          <td style={{textAlign:'right',fontWeight:700,color:p.marginPct===null?'var(--gris-300)':p.marginPct>=avgMargin?'var(--vert)':'var(--rouge)'}}>{p.marginPct!==null?p.marginPct.toFixed(1)+'%':'—'}</td>
          <td><span style={{fontSize:9,fontWeight:600,color:bcgColors[classify(p)]}}>{classify(p)}</span></td></tr>
        );})}</tbody>
      </table></div></div>
    </div>

    {bestMargin.length>0&&<div className="cg">
      <div className="card">
        <div className="card-h"><div><div className="card-t">Meilleures marges</div></div></div>
        <div className="card-b"><div className="tbl"><table>
          <thead><tr><th>Article</th><th style={{textAlign:'right'}}>Qty</th><th style={{textAlign:'right'}}>Prix Vente</th><th style={{textAlign:'right'}}>Coût</th><th style={{textAlign:'right'}}>Marge</th><th>BCG</th></tr></thead>
          <tbody>{bestMargin.map(function(p,i){return(
            <tr key={i}><td style={{fontWeight:500}}>{p.nom}</td>
            <td style={{textAlign:'right'}}>{fmt(p.qty)}</td><td style={{textAlign:'right'}}>{eur(p.prixVente)}</td><td style={{textAlign:'right'}}>{eur(p.costUnit)}</td>
            <td style={{textAlign:'right',fontWeight:700,color:'var(--vert)'}}>{p.marginPct.toFixed(1)}%</td>
            <td><span style={{fontSize:9,fontWeight:600,color:bcgColors[classify(p)]}}>{classify(p)}</span></td></tr>
          );})}</tbody>
        </table></div></div>
      </div>
      <div className="card">
        <div className="card-h"><div><div className="card-t">Pires marges</div><div className="card-st">Articles à retravailler</div></div></div>
        <div className="card-b"><div className="tbl"><table>
          <thead><tr><th>Article</th><th style={{textAlign:'right'}}>Qty</th><th style={{textAlign:'right'}}>Prix Vente</th><th style={{textAlign:'right'}}>Coût</th><th style={{textAlign:'right'}}>Marge</th><th>Action</th></tr></thead>
          <tbody>{worstMargin.map(function(p,i){return(
            <tr key={i} style={{background:p.marginPct<0?'rgba(220,38,38,.04)':'transparent'}}><td style={{fontWeight:500}}>{p.nom}</td>
            <td style={{textAlign:'right'}}>{fmt(p.qty)}</td><td style={{textAlign:'right'}}>{eur(p.prixVente)}</td><td style={{textAlign:'right'}}>{eur(p.costUnit)}</td>
            <td style={{textAlign:'right',fontWeight:700,color:'var(--rouge)'}}>{p.marginPct.toFixed(1)}%</td>
            <td><span className="badge b-warn" style={{fontSize:9}}>{p.qty>=avgQty?'Renégocier':'Retirer?'}</span></td></tr>
          );})}</tbody>
        </table></div></div>
      </div>
    </div>}

    {/* Matrice BCG visuelle */}
    {withCost.length>0&&<div className="card" style={{marginBottom:14}}>
      <div className="card-h"><div><div className="card-t">Matrice BCG — Menu Engineering</div><div className="card-st">Popularité (quantité) vs Rentabilité (marge %)</div></div></div>
      <div className="card-b">
        {/* 4 quadrants grid */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:2,marginBottom:14}}>
          <div style={{background:'#ecfdf5',padding:14,borderRadius:'8px 0 0 0',minHeight:120}}>
            <div style={{fontWeight:700,color:'var(--vert)',marginBottom:6}}>★ Stars ({stars.length})</div>
            <div style={{fontSize:11,color:'var(--gris-600)',marginBottom:6}}>Populaires & rentables — Maintenir en avant</div>
            {stars.slice(0,5).map(function(p,i){return <div key={i} style={{fontSize:11,padding:'2px 0'}}>{p.nom} <span style={{color:'var(--vert)',fontWeight:600}}>{p.marginPct.toFixed(0)}%</span> — {p.qty} vendus</div>;})}
            {stars.length>5&&<div style={{fontSize:10,color:'var(--gris-400)'}}>+{stars.length-5} autres</div>}
          </div>
          <div style={{background:'#fef3c7',padding:14,borderRadius:'0 8px 0 0',minHeight:120}}>
            <div style={{fontWeight:700,color:'var(--orange)',marginBottom:6}}>? Puzzles ({puzzles.length})</div>
            <div style={{fontSize:11,color:'var(--gris-600)',marginBottom:6}}>Rentables mais peu vendus — Promouvoir</div>
            {puzzles.slice(0,5).map(function(p,i){return <div key={i} style={{fontSize:11,padding:'2px 0'}}>{p.nom} <span style={{color:'var(--orange)',fontWeight:600}}>{p.marginPct.toFixed(0)}%</span> — {p.qty} vendus</div>;})}
            {puzzles.length>5&&<div style={{fontSize:10,color:'var(--gris-400)'}}>+{puzzles.length-5} autres</div>}
          </div>
          <div style={{background:'#dbeafe',padding:14,borderRadius:'0 0 0 8px',minHeight:120}}>
            <div style={{fontWeight:700,color:'#2563eb',marginBottom:6}}>🐴 Chevaux ({chevaux.length})</div>
            <div style={{fontSize:11,color:'var(--gris-600)',marginBottom:6}}>Populaires mais faible marge — Augmenter prix ou réduire coût</div>
            {chevaux.slice(0,5).map(function(p,i){return <div key={i} style={{fontSize:11,padding:'2px 0'}}>{p.nom} <span style={{color:'#2563eb',fontWeight:600}}>{p.marginPct.toFixed(0)}%</span> — {p.qty} vendus</div>;})}
            {chevaux.length>5&&<div style={{fontSize:10,color:'var(--gris-400)'}}>+{chevaux.length-5} autres</div>}
          </div>
          <div style={{background:'#fef2f2',padding:14,borderRadius:'0 0 8px 0',minHeight:120}}>
            <div style={{fontWeight:700,color:'var(--rouge)',marginBottom:6}}>🐕 Dogs ({dogs.length})</div>
            <div style={{fontSize:11,color:'var(--gris-600)',marginBottom:6}}>Ni populaire ni rentable — Retirer ou reformuler</div>
            {dogs.slice(0,5).map(function(p,i){return <div key={i} style={{fontSize:11,padding:'2px 0'}}>{p.nom} <span style={{color:'var(--rouge)',fontWeight:600}}>{p.marginPct.toFixed(0)}%</span> — {p.qty} vendus</div>;})}
            {dogs.length>5&&<div style={{fontSize:10,color:'var(--gris-400)'}}>+{dogs.length-5} autres</div>}
          </div>
        </div>
        {/* Recommendations */}
        <div style={{background:'var(--cream,#fdf6f0)',border:'1px solid #e8d5c4',borderRadius:8,padding:14}}>
          <div style={{fontWeight:700,fontSize:13,marginBottom:8,color:'var(--bordeaux)'}}>Recommandations</div>
          <div style={{fontSize:12,lineHeight:1.6}}>
            {puzzles.length>0&&<div>📈 <strong>Promouvoir :</strong> {puzzles.slice(0,3).map(function(p){return p.nom;}).join(', ')} — bonne marge mais peu vendus. Mettre en avant sur la carte ou en suggestion serveur.</div>}
            {chevaux.length>0&&<div style={{marginTop:4}}>💰 <strong>Optimiser le prix :</strong> {chevaux.slice(0,3).map(function(p){return p.nom;}).join(', ')} — populaires mais marge faible. Envisager +1-2€ ou réduire la portion/coût.</div>}
            {dogs.length>0&&<div style={{marginTop:4}}>❌ <strong>Repenser :</strong> {dogs.slice(0,3).map(function(p){return p.nom;}).join(', ')} — ni populaires ni rentables. Retirer du menu ou reformuler la recette.</div>}
            {stars.length>0&&<div style={{marginTop:4}}>✅ <strong>Conserver :</strong> {stars.slice(0,3).map(function(p){return p.nom;}).join(', ')} — vos best-sellers rentables. Ne pas toucher !</div>}
          </div>
        </div>
      </div>
    </div>}

    {noCost.length>0&&<div className="card">
      <div className="card-h"><div><div className="card-t">Articles sans coût connu ({noCost.length})</div><div className="card-st">Ajoutez les coûts dans RecipeCosts pour compléter l'analyse</div></div></div>
      <div className="card-b"><div className="tbl"><table>
        <thead><tr><th>Article</th><th>Catégorie</th><th style={{textAlign:'right'}}>Qty</th><th style={{textAlign:'right'}}>CA</th><th style={{textAlign:'right'}}>Prix Vente</th></tr></thead>
        <tbody>{noCost.sort(function(a,b){return b.ca-a.ca;}).slice(0,20).map(function(p,i){return(
          <tr key={i}><td style={{fontWeight:500}}>{p.nom}</td><td><span className="badge b-ima" style={{fontSize:9}}>{p.cat}</span></td>
          <td style={{textAlign:'right'}}>{fmt(p.qty)}</td><td style={{textAlign:'right',fontWeight:600}}>{eur(p.ca)}</td>
          <td style={{textAlign:'right'}}>{eur(p.prixVente)}</td></tr>
        );})}</tbody>
      </table></div></div>
    </div>}
  </div>);
}

// ===== ALERTES =====
function Alertes(){
  const trivec=typeof TRIVEC_SEASON!=='undefined'?TRIVEC_SEASON:null;
  const pCtx=usePeriod();
  const invCtx=useInvoices();
  const invoices=invCtx.invoices;
  const loading=invCtx.loading;

  // Load configurable thresholds from localStorage
  const [thresholds,setThresholds]=useState(function(){
    const stored=localStorage.getItem('ima_alert_thresholds');
    return stored?JSON.parse(stored):{foodCostMax:30,barCostMax:22,staffCostMax:30,primeCostMax:65};
  });
  const [showThresholdConfig,setShowThresholdConfig]=useState(false);
  const [editThresholds,setEditThresholds]=useState(thresholds);

  const saveThresholds=function(){
    localStorage.setItem('ima_alert_thresholds',JSON.stringify(editThresholds));
    setThresholds(editThresholds);
    setShowThresholdConfig(false);
  };

  const totalCA=trivec?trivec.ventesNet:0;
  // CA HT par catégorie (montants Trivec TTC → HT)
  const caNourritureTTC=trivec?trivec.categories.find(c=>c.nom==='Nourriture').montant:0;
  const caNourriture=Math.round(caNourritureTTC/1.10);
  const caBoissonsTTC=trivec?(trivec.categories.find(c=>c.nom==='Boissons Alcoolisées').montant+trivec.categories.find(c=>c.nom==='Boissons Sans Alcool').montant):0;
  const caBoissons=trivec?Math.round(trivec.categories.find(c=>c.nom==='Boissons Alcoolisées').montant/1.20+trivec.categories.find(c=>c.nom==='Boissons Sans Alcool').montant/1.10):0;

  // Filtrer factures à la période saison
  const _sfA=trivec?trivec.periode.from.split('/').reverse().join('-'):'2025-12-01';
  const seasonInvA=useMemo(()=>invoices.filter(function(inv){return inv.date&&inv.date>=_sfA;}),[invoices,_sfA]);
  const totals=useMemo(()=>SupplierMap.getTotals(seasonInvA),[seasonInvA]);
  const foodCost=totals['Food']||0;
  const barCost=totals['Bar']||0;
  const staffCost=trivec?pCtx.msActive:pCtx.msProrata;

  const foodPct=caNourriture>0?foodCost/caNourriture*100:0;
  const barPct=caBoissons>0?barCost/caBoissons*100:0;
  const staffPct=totalCA>0?staffCost/totalCA*100:0;
  const primePct=totalCA>0?(foodCost+barCost+staffCost)/totalCA*100:0;

  // Calculate health score (0-100)
  const foodScore=Math.max(0,Math.min(25,(thresholds.foodCostMax-foodPct)*2.5));
  const barScore=Math.max(0,Math.min(25,(thresholds.barCostMax-barPct)*2.5));
  const staffScore=Math.max(0,Math.min(25,(thresholds.staffCostMax-staffPct)*2.5));
  const trendScore=primePct<(thresholds.primeCostMax-5)?25:primePct<=thresholds.primeCostMax?12:0;
  const healthScore=Math.round(foodScore+barScore+staffScore+trendScore);

  const alerts=[];
  if(foodPct>thresholds.foodCostMax)alerts.push({type:'err',title:'Food Cost élevé',msg:`${foodPct.toFixed(1)}% (objectif: ≤${thresholds.foodCostMax}%)`,priority:10});
  if(barPct>thresholds.barCostMax)alerts.push({type:'err',title:'Bar Cost élevé',msg:`${barPct.toFixed(1)}% (objectif: ≤${thresholds.barCostMax}%)`,priority:9});
  if(staffPct>thresholds.staffCostMax)alerts.push({type:'warn',title:'Staff Cost élevé',msg:`${staffPct.toFixed(1)}% (objectif: ≤${thresholds.staffCostMax}%)`,priority:8});
  if(primePct>thresholds.primeCostMax)alerts.push({type:'err',title:'Prime Cost élevée',msg:`${primePct.toFixed(1)}% (objectif: ≤${thresholds.primeCostMax}%)`,priority:7});

  const nonClasses=Object.keys(totals).filter(k=>k==='Non classé'&&totals[k]>0).length>0?
    invoices.filter(i=>SupplierMap.getCategory(String(i.supplier&&i.supplier.id||''))==='Non classé').length:0;
  if(nonClasses>0)alerts.push({type:'warn',title:'Fournisseurs non classés',msg:`${nonClasses} factures à classer`,priority:6});

  const upcomingDepartures=PayrollService.getUpcomingDepartures();

// ===== COMPARATIF =====
function Comparatif(){
  const allDays=TrivecService.getAllDays();
  const S=TRIVEC_SEASON;
  const monthly=S.monthly||[];

  // Get last 7 full days (week comparison)
  const sorted=Object.entries(allDays).sort((a,b)=>new Date(b[0])-new Date(a[0])).slice(0,14);
  const week1=sorted.slice(0,7).reverse();
  const week2=sorted.slice(7,14).reverse();

  // Day of week analysis (all data)
  const doW={};
  Object.entries(allDays).forEach(([dateStr,data])=>{
    const dt=new Date(parseInt(dateStr.split('/')[2]),parseInt(dateStr.split('/')[1])-1,parseInt(dateStr.split('/')[0]));
    const day=['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'][dt.getDay()];
    if(!doW[day])doW[day]={ca:0,couverts:0,count:0};
    doW[day].ca+=data.ventes?.restaurant||data.ventes?.total||0;
    doW[day].couverts+=(data.couverts?.restaurant?.total||0);
    doW[day].count++;
  });

  // Best month
  const bestMonth=monthly.length>0?monthly.reduce((best,m)=>m.ventesNet>best.ventesNet?m:best,monthly[0]):null;
  const maxMonthlyCA=monthly.length>0?Math.max(...monthly.map(m=>m.ventesNet)):1;

  return(<div className="fin">
    {/* Comparaison mensuelle */}
    {monthly.length>0&&<div className="card" style={{marginBottom:16}}>
      <div className="card-h"><div><div className="card-t">Comparaison mensuelle</div><div className="card-st">Évolution mois par mois — Saison {S.periode.label}</div></div></div>
      <div className="card-b">
        <div className="tbl"><table>
          <thead><tr><th>Mois</th><th style={{textAlign:'right'}}>CA Net</th><th style={{textAlign:'right'}}>CA HT</th><th style={{textAlign:'right'}}>Tickets</th><th style={{textAlign:'right'}}>Couverts</th><th style={{textAlign:'right'}}>TM Resto</th><th style={{textAlign:'right'}}>TVA</th><th style={{textAlign:'right'}}>Interne</th><th>Part CA</th></tr></thead>
          <tbody>{monthly.map(function(m,i){
            var htTotal=m.tva.taux10.ht+m.tva.taux20.ht;
            var tmResto=m.couverts>0?Math.round(m.tva.taux10.ht/m.couverts):0;
            var pctCA=S.ventesNet>0?Math.round(m.ventesNet/S.ventesNet*1000)/10:0;
            var barW=Math.round(m.ventesNet/maxMonthlyCA*100);
            var prev=i>0?monthly[i-1]:null;
            var delta=prev?((m.ventesNet-prev.ventesNet)/prev.ventesNet*100):0;
            return React.createElement('tr',{key:i,style:{background:m===bestMonth?'var(--vert-light)':'transparent'}},
              React.createElement('td',{style:{fontWeight:600}},m.mois,m===bestMonth?' ★':'',prev?React.createElement('span',{style:{fontSize:10,marginLeft:6,color:delta>=0?'var(--vert)':'var(--rouge)'}},(delta>=0?'+':'')+delta.toFixed(1)+'%'):null),
              React.createElement('td',{style:{textAlign:'right',fontWeight:700}},eur(m.ventesNet)),
              React.createElement('td',{style:{textAlign:'right'}},eur(htTotal)),
              React.createElement('td',{style:{textAlign:'right'}},fmt(m.tickets)),
              React.createElement('td',{style:{textAlign:'right'}},fmt(m.couverts)),
              React.createElement('td',{style:{textAlign:'right',fontWeight:600}},eur(tmResto)),
              React.createElement('td',{style:{textAlign:'right',fontSize:12}},eur(m.tva.taux10.tva+m.tva.taux20.tva)),
              React.createElement('td',{style:{textAlign:'right',fontSize:12}},eur(m.interne)),
              React.createElement('td',null,
                React.createElement('div',{style:{display:'flex',alignItems:'center',gap:6}},
                  React.createElement('div',{style:{flex:1,height:16,background:'var(--gris-100)',borderRadius:4,overflow:'hidden'}},
                    React.createElement('div',{style:{width:barW+'%',height:'100%',background:'var(--bordeaux)',borderRadius:4}})
                  ),
                  React.createElement('span',{style:{fontSize:11,fontWeight:600,minWidth:36}},pctCA+'%')
                )
              )
            );
          })}</tbody>
          <tfoot>{React.createElement('tr',{style:{fontWeight:700,borderTop:'2px solid var(--gris-300)',background:'var(--gris-50)'}},
            React.createElement('td',null,'TOTAL SAISON'),
            React.createElement('td',{style:{textAlign:'right',color:'var(--bordeaux)'}},eur(S.ventesNet)),
            React.createElement('td',{style:{textAlign:'right'}},eur(S.tva.taux10.ht+S.tva.taux20.ht)),
            React.createElement('td',{style:{textAlign:'right'}},fmt(S.tickets)),
            React.createElement('td',{style:{textAlign:'right'}},fmt(S.couverts)),
            React.createElement('td',{style:{textAlign:'right'}},S.couverts>0?eur(Math.round(S.tva.taux10.ht/S.couverts)):'—'),
            React.createElement('td',{style:{textAlign:'right',fontSize:12}},eur(S.tva.taux10.tva+S.tva.taux20.tva)),
            React.createElement('td',{style:{textAlign:'right',fontSize:12}},eur(S.interne)),
            React.createElement('td',null,'100%')
          )}</tfoot>
        </table></div>
      </div>
    </div>}

    {/* KPI mensuels */}
    {monthly.length>0&&<div className="kpi-g" style={{marginBottom:16}}>
      <div className="kpi"><div className="kpi-label">Meilleur mois</div><div className="kpi-val" style={{color:'var(--vert)'}}>{bestMonth?bestMonth.mois:''}</div><div className="kpi-chg pos">{bestMonth?eur(bestMonth.ventesNet)+' net':''}</div></div>
      <div className="kpi"><div className="kpi-label">CA moyen / mois</div><div className="kpi-val">{eur(Math.round(S.ventesNet/monthly.length))}</div><div className="kpi-chg neu">Sur {monthly.length} mois</div></div>
      <div className="kpi"><div className="kpi-label">Croissance Fév vs Déc</div><div className="kpi-val" style={{color:monthly.length>=3&&monthly[2].ventesNet>monthly[0].ventesNet?'var(--vert)':'var(--rouge)'}}>{monthly.length>=3?((monthly[2].ventesNet-monthly[0].ventesNet)/monthly[0].ventesNet*100).toFixed(1)+'%':'—'}</div><div className="kpi-chg pos">{monthly.length>=3?eur(monthly[2].ventesNet-monthly[0].ventesNet):''}</div></div>
      <div className="kpi"><div className="kpi-label">Couverts / mois moyen</div><div className="kpi-val">{fmt(Math.round(S.couverts/monthly.length))}</div><div className="kpi-chg neu">{fmt(S.couverts)} total saison</div></div>
    </div>}

    <div className="card" style={{marginBottom:16}}>
      <div className="card-h"><div><div className="card-t">Comparaison semaine vs semaine</div></div></div>
      <div className="card-b"><div className="tbl"><table>
        <thead><tr><th style={{textAlign:'left'}}>Jour</th><th style={{textAlign:'right'}}>CA S-2</th><th style={{textAlign:'right'}}>CA S-1</th><th style={{textAlign:'right'}}>Δ</th><th style={{textAlign:'right'}}>Δ%</th></tr></thead>
        <tbody>{week1.map(([d1],i)=>{
          const d2=week2[i];
          const ca1=allDays[d1]?.ventes?.total||0;
          const ca2=d2?allDays[d2[0]]?.ventes?.total||0:0;
          const delta=ca2-ca1;
          const deltaPct=ca1>0?(delta/ca1)*100:0;
          return(<tr key={i}><td style={{fontWeight:500}}>{d1}</td><td style={{textAlign:'right'}}>{eur(ca1)}</td><td style={{textAlign:'right'}}>{eur(ca2)}</td>
          <td style={{textAlign:'right',fontWeight:700,color:delta>=0?'var(--vert)':'var(--rouge)'}}>{delta>=0?'+':''}{eur(delta)}</td>
          <td style={{textAlign:'right',color:deltaPct>=0?'var(--vert)':'var(--rouge)'}}>{deltaPct>=0?'+':''}{deltaPct.toFixed(1)}%</td></tr>);
        })}</tbody>
      </table></div></div>
    </div>

    <div className="card">
      <div className="card-h"><div><div className="card-t">Analyse par jour de semaine</div><div className="card-st">Performance moyenne par jour</div></div></div>
      <div className="card-b"><div className="tbl"><table>
        <thead><tr><th>Jour</th><th style={{textAlign:'right'}}>CA moyen</th><th style={{textAlign:'right'}}>Couverts</th><th style={{textAlign:'right'}}>Ticket moyen</th><th>Tendance</th></tr></thead>
        <tbody>{['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'].map(day=>{
          const d=doW[day];
          if(!d)return null;
          const caAvg=Math.round(d.ca/d.count);
          const covAvg=Math.round(d.couverts/d.count);
          const tmAvg=covAvg>0?Math.round(d.ca/d.couverts):0;
          return(<tr key={day}><td style={{fontWeight:600}}>{day}</td><td style={{textAlign:'right'}}>{eur(caAvg)}</td><td style={{textAlign:'right'}}>{fmt(covAvg)}</td>
          <td style={{textAlign:'right',fontWeight:600}}>{eur(tmAvg)}</td><td><span className="badge b-ima" style={{fontSize:9}}>{covAvg>1000?'Fort':'Moyen'}</span></td></tr>);
        })}</tbody>
      </table></div></div>
    </div>
  </div>);
}

// ===== GOOGLE PLACES SERVICE =====
const GooglePlacesService={
  _cacheKey:'ima_google_reviews_cache',
  _cacheTTL:3600000, // 1 heure
  getConfig:function(){
    return{
      apiKey:localStorage.getItem('ima_google_api_key')||'',
      placeId:localStorage.getItem('ima_google_place_id')||''
    };
  },
  isConfigured:function(){
    var c=this.getConfig();
    return c.apiKey.length>5&&c.placeId.length>5;
  },
  getCached:function(){
    try{
      var raw=localStorage.getItem(this._cacheKey);
      if(!raw)return null;
      var cached=JSON.parse(raw);
      if(Date.now()-cached.ts>this._cacheTTL)return null;
      return cached.data;
    }catch(e){return null;}
  },
  setCache:function(data){
    try{localStorage.setItem(this._cacheKey,JSON.stringify({ts:Date.now(),data:data}));}catch(e){}
  },
  fetchPlaceDetails:async function(){
    if(!this.isConfigured())throw new Error('Google Places API non configurée. Allez dans Administration pour configurer la clé API et le Place ID.');
    var cached=this.getCached();
    if(cached)return cached;
    var c=this.getConfig();
    var fields='displayName,rating,userRatingCount,reviews';
    var url='https://places.googleapis.com/v1/places/'+c.placeId+'?fields='+fields+'&languageCode=fr&key='+c.apiKey;
    var response=await fetch(url);
    if(!response.ok){
      var errBody='';
      try{errBody=JSON.stringify(await response.json());}catch(e){}
      throw new Error('Erreur Google Places API ('+response.status+'): '+errBody);
    }
    var data=await response.json();
    var result={
      name:data.displayName?data.displayName.text:'',
      rating:data.rating||0,
      totalReviews:data.userRatingCount||0,
      reviews:(data.reviews||[]).map(function(r){
        return{
          author:r.authorAttribution?r.authorAttribution.displayName:'Anonyme',
          authorPhoto:r.authorAttribution?r.authorAttribution.photoUri:'',
          rating:r.rating||0,
          text:r.text?r.text.text:'',
          time:r.relativePublishTimeDescription||'',
          publishTime:r.publishTime||''
        };
      })
    };
    this.setCache(result);
    return result;
  },
  clearCache:function(){localStorage.removeItem(this._cacheKey);}
};

// ===== REPUTATION =====
function Reputation(){
  var[gData,setGData]=useState(null);
  var[loading,setLoading]=useState(false);
  var[error,setError]=useState('');
  var configured=GooglePlacesService.isConfigured();

  var fetchData=useCallback(function(forceRefresh){
    if(!configured)return;
    if(forceRefresh)GooglePlacesService.clearCache();
    setLoading(true);
    setError('');
    GooglePlacesService.fetchPlaceDetails()
      .then(function(d){setGData(d);})
      .catch(function(e){setError(e.message||'Erreur inconnue');})
      .finally(function(){setLoading(false);});
  },[configured]);

  useEffect(function(){
    if(configured)fetchData(false);
  },[configured]);

  // Étoiles visuelles
  function Stars(props){
    var rating=props.rating||0;
    var size=props.size||16;
    var stars=[];
    for(var i=1;i<=5;i++){
      var fill=rating>=i?'var(--orange)':rating>=i-0.5?'var(--orange)':'var(--gris-200)';
      var partial=rating>=i?100:rating>=i-0.5?50:0;
      if(partial===100){
        stars.push(React.createElement('span',{key:i,style:{color:'#f59e0b',fontSize:size}},'★'));
      }else if(partial===50){
        stars.push(React.createElement('span',{key:i,style:{color:'#f59e0b',fontSize:size,position:'relative',display:'inline-block'}},
          React.createElement('span',{style:{color:'var(--gris-200)'}},'★'),
          React.createElement('span',{style:{position:'absolute',left:0,top:0,overflow:'hidden',width:'50%',color:'#f59e0b'}},'★')
        ));
      }else{
        stars.push(React.createElement('span',{key:i,style:{color:'var(--gris-200)',fontSize:size}},'★'));
      }
    }
    return React.createElement('span',{style:{display:'inline-flex',gap:1}},stars);
  }

  // Distribution des notes depuis les avis
  var distribution=useMemo(function(){
    var dist={5:0,4:0,3:0,2:0,1:0};
    if(gData&&gData.reviews){
      gData.reviews.forEach(function(r){
        var k=Math.round(r.rating);
        if(k>=1&&k<=5)dist[k]++;
      });
    }
    return dist;
  },[gData]);

  if(!configured){
    return React.createElement('div',{className:'fin'},
      React.createElement('div',{className:'card'},
        React.createElement('div',{className:'card-h'},React.createElement('div',null,
          React.createElement('div',{className:'card-t'},'Réputation — Configuration requise')
        )),
        React.createElement('div',{className:'card-b',style:{textAlign:'center',padding:40}},
          React.createElement('div',{style:{fontSize:48,marginBottom:16}},'⭐'),
          React.createElement('div',{style:{fontSize:15,color:'var(--gris-600)',marginBottom:16}},'Pour afficher vos avis Google, configurez votre clé API Google Places et votre Place ID dans la page Administration.'),
          React.createElement('div',{style:{fontSize:12,color:'var(--gris-400)'}},'Administration → Google Places API')
        )
      )
    );
  }

  if(loading&&!gData){
    return React.createElement('div',{className:'fin'},
      React.createElement('div',{style:{textAlign:'center',padding:60}},
        React.createElement('div',{className:'spinner'}),
        React.createElement('div',{style:{marginTop:12,color:'var(--gris-400)',fontSize:13}},'Chargement des avis Google...')
      )
    );
  }

  if(error&&!gData){

// ===== COMPARATIF BP =====
function ComparatifBP(){
  const S=TRIVEC_SEASON;
  const monthly=S.monthly||[];
  const{invoices}=useInvoices();

  // Helper: convert DD/MM/YYYY → YYYY-MM-DD
  const toISO=d=>d.split('/').reverse().join('-');

  // Filter invoices for a given month using from/to dates
  const getMonthInvoices=(month)=>{
    const start=toISO(month.from);
    const end=toISO(month.to);
    return invoices.filter(inv=>inv.date&&inv.date>=start&&inv.date<=end);
  };

  // Staff costs per month from PayrollService
  const staffPerMonth={
    'Décembre 2025':PayrollService.getMasseSalarialeDec(),
    'Janvier 2026':PayrollService.getMasseSalariale(),
    'Février 2026':PayrollService.getMasseSalarialeFev()
  };

  // Month data with BP comparison
  const monthData=monthly.map(month=>{
    const bpMonth=BP_DATA.monthly.find(x=>x.mois===month.mois);

    // Real CA from Trivec
    const realCA=month.ventesNet;

    // Real COGS from invoices (Food + Bar HT)
    const mInv=getMonthInvoices(month);
    const totals=SupplierMap.getTotals(mInv);
    const realCOGS=(totals['Food']||0)+(totals['Bar']||0);

    // Real staff from payroll
    const realStaff=staffPerMonth[month.mois]||0;

    // Real EBITDA simplified = CA - COGS - Staff
    const realEBITDA=realCA-realCOGS-realStaff;

    return{
      mois:month.mois,realCA,realCOGS,realStaff,realEBITDA,
      bpCA:bpMonth?bpMonth.caTotal:0,
      bpCOGS:bpMonth?Math.abs(bpMonth.cogsTotal):0,
      bpStaff:bpMonth?Math.abs(bpMonth.staffCosts):0,
      bpEBITDA:bpMonth?bpMonth.ebitda:0
    };
  });

  // Calculate season totals
  const annualRealCA=monthData.reduce((s,m)=>s+m.realCA,0);
  const annualRealCOGS=monthData.reduce((s,m)=>s+m.realCOGS,0);
  const annualRealStaff=monthData.reduce((s,m)=>s+m.realStaff,0);
  const annualRealEBITDA=monthData.reduce((s,m)=>s+m.realEBITDA,0);

  return(<div className="fin">
    <div className="card" style={{marginBottom:16}}>
      <div className="card-h"><div><div className="card-t">BP vs Réalité</div><div className="card-st">Comparaison Business Plan vs Réalisé</div></div></div>
      <div className="card-b">
        <div className="tbl"><table style={{fontSize:13}}>
          <thead><tr><th>Période</th><th style={{textAlign:'right'}}>CA BP</th><th style={{textAlign:'right'}}>CA Réel</th><th style={{textAlign:'right'}}>Écart %</th><th style={{textAlign:'right'}}>COGS BP</th><th style={{textAlign:'right'}}>COGS Réel</th><th style={{textAlign:'right'}}>Staff BP</th><th style={{textAlign:'right'}}>Staff Réel</th><th style={{textAlign:'right'}}>EBITDA BP</th><th style={{textAlign:'right'}}>EBITDA Réel</th></tr></thead>
          <tbody>
            {monthData.map((m,i)=>{
              const caEcart=m.bpCA>0?Math.round((m.realCA-m.bpCA)/m.bpCA*1000)/10:0;
              const caColor=caEcart>=0?'var(--vert)':'var(--rouge)';
              return(<tr key={i}>
                <td>{m.mois}</td>
                <td style={{textAlign:'right'}}>{eur(m.bpCA)}</td>
                <td style={{textAlign:'right'}}>{eur(m.realCA)}</td>
                <td style={{textAlign:'right',color:caColor,fontWeight:'bold'}}>{caEcart>0?'+':''}{caEcart}%</td>
                <td style={{textAlign:'right'}}>{eur(m.bpCOGS)}</td>
                <td style={{textAlign:'right'}}>{eur(m.realCOGS)}</td>
                <td style={{textAlign:'right'}}>{eur(m.bpStaff)}</td>
                <td style={{textAlign:'right'}}>{eur(m.realStaff)}</td>
                <td style={{textAlign:'right'}}>{eur(m.bpEBITDA)}</td>
                <td style={{textAlign:'right'}}>{eur(m.realEBITDA)}</td>
              </tr>);
            })}
            <tr style={{borderTop:'2px solid var(--gris-4)',fontWeight:'bold',backgroundColor:'var(--gris-1)'}}>
              <td>TOTAL SAISON</td>
              <td style={{textAlign:'right'}}>{eur(BP_DATA.annual.caTotal)}</td>
              <td style={{textAlign:'right'}}>{eur(annualRealCA)}</td>
              <td style={{textAlign:'right',color:BP_DATA.annual.caTotal>0?'var(--vert)':'var(--rouge)'}}>
                {Math.round((annualRealCA-BP_DATA.annual.caTotal)/BP_DATA.annual.caTotal*1000)/10}%
              </td>
              <td style={{textAlign:'right'}}>{eur(Math.abs(BP_DATA.annual.cogsTotal))}</td>
              <td style={{textAlign:'right'}}>{eur(annualRealCOGS)}</td>
              <td style={{textAlign:'right'}}>{eur(Math.abs(BP_DATA.annual.staffCosts))}</td>
              <td style={{textAlign:'right'}}>{eur(annualRealStaff)}</td>
              <td style={{textAlign:'right'}}>{eur(BP_DATA.annual.ebitda)}</td>
              <td style={{textAlign:'right'}}>{eur(annualRealEBITDA)}</td>
            </tr>
          </tbody>
        </table></div>
      </div>
    </div>
  </div>);
}

// ===== FORECAST =====
function Forecast(){
  const S=TRIVEC_SEASON;
  const[ticketMoyen,setTicketMoyen]=useState(180);
  const[couverts,setCouverts]=useState(280);
  const[foodCostPct,setFoodCostPct]=useState(20);
  const[barCostPct,setBarCostPct]=useState(18);

  const monthly=S.monthly||[];
  const totalDaysElapsed=monthly.reduce((s,m)=>s+(m.days||30),0);
  const totalCARealized=monthly.reduce((s,m)=>s+m.ventesNet,0);
  const avgCAPerDay=totalDaysElapsed>0?totalCARealized/totalDaysElapsed:0;

  // Current trajectory: assuming 3 months, 90 days total
  const totalDaysInSeason=90;
  const daysRemaining=Math.max(0,totalDaysInSeason-totalDaysElapsed);
  const projectedCA=totalCARealized+avgCAPerDay*daysRemaining;

  // Objective: based on sliders
  const objectiveCA=ticketMoyen*couverts*(totalDaysInSeason/30)*1.3; // 1.3 = bar multiplier

  return(<div className="fin">
    <div className="kpi-g" style={{marginBottom:24}}>

      <div className="card-b">
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:16}}>

            <label style={{display:'block',marginBottom:8,fontSize:12,fontWeight:'bold',color:'var(--gris-6)'}}>Ticket moyen: {eur(ticketMoyen)}</label>

function InventaireEcarts(){
  const[inventaire,setInventaire]=useState(JSON.parse(localStorage.getItem('ima_inventaire_v1')||'[]'));
  const[newMonth,setNewMonth]=useState('');
  const[items,setItems]=useState({});

  const recipes=RecipeCosts.recipes||{};
  const monthlyData=TRIVEC_SEASON.monthly||[];

  const handleAddInventaire=()=>{
    if(!newMonth)return;
    const inv={date:newMonth,items:Object.assign({},items),timestamp:new Date().toISOString()};
    const updated=[...inventaire,inv];
    setInventaire(updated);
    localStorage.setItem('ima_inventaire_v1',JSON.stringify(updated));
    setNewMonth('');
    setItems({});
  };

  const calcEcart=(ingredientName,realQty)=>{
    const recipe=recipes[ingredientName];
    if(!recipe)return null;
    const monthCA=monthlyData.length>0?monthlyData[monthlyData.length-1].ventesNet:0;
    const theorique=monthCA*recipe.costPct/100;
    const real=realQty||0;
    const ecart=real-theorique;
    const ecartPct=theorique>0?ecart/theorique*100:0;
    return{theorique,real,ecart,ecartPct};
  };

  const totalFood=monthlyData.length>0?monthlyData.reduce((s,m)=>s+m.tva.taux10.ht,0):0;

  return(<div className="fin">
    <div className="card" style={{marginBottom:16}}>
      <div className="card-h"><div><div className="card-t">Enregistrement Inventaire</div><div className="card-st">Saisie du stock physique mensuel</div></div></div>
      <div className="card-b">
        <div style={{marginBottom:12}}>
          <label style={{display:'block',marginBottom:6,fontSize:12,fontWeight:'bold'}}>Mois</label>
          <input type="month" value={newMonth} onChange={e=>setNewMonth(e.target.value)} style={{padding:8,border:'1px solid var(--gris-3)',borderRadius:4,width:'100%',maxWidth:200}}/>
        </div>
        <div style={{marginBottom:12}}>
          <label style={{display:'block',marginBottom:6,fontSize:12,fontWeight:'bold'}}>Articles principaux</label>
          {Object.keys(recipes).slice(0,5).map(ing=>(
            <div key={ing} style={{marginBottom:8,padding:8,backgroundColor:'var(--gris-1)',borderRadius:4}}>
              <label style={{fontSize:12,display:'block',marginBottom:4}}>{ing} (€)</label>
              <input type="number" value={items[ing]||''} onChange={e=>setItems({...items,[ing]:Number(e.target.value)||0})}
                style={{padding:6,border:'1px solid var(--gris-3)',borderRadius:3,width:'100%'}}/>
            </div>
          ))}
        </div>
        <button onClick={handleAddInventaire} className="btn btn-primary">Enregistrer Inventaire</button>
      </div>
    </div>

    {inventaire.length>0&&<div className="card">
      <div className="card-h"><div><div className="card-t">Écarts détectés</div><div className="card-st">Analyse des écarts théorique vs réel</div></div></div>
      <div className="card-b">
        <div className="tbl"><table style={{fontSize:12}}>
          <thead><tr><th>Article</th><th style={{textAlign:'right'}}>Théorique</th><th style={{textAlign:'right'}}>Réel</th><th style={{textAlign:'right'}}>Écart</th><th style={{textAlign:'right'}}>%</th><th>Statut</th></tr></thead>
          <tbody>
            {inventaire.slice(-1)[0]&&Object.entries(inventaire.slice(-1)[0].items).map(([ing,real])=>{
              const ec=calcEcart(ing,real);
              if(!ec)return null;
              const color=Math.abs(ec.ecartPct)>10?'var(--rouge)':'var(--gris-5)';
              return(<tr key={ing}>
                <td>{ing}</td>
                <td style={{textAlign:'right'}}>{eur(ec.theorique)}</td>
                <td style={{textAlign:'right'}}>{eur(ec.real)}</td>
                <td style={{textAlign:'right',color}}>{eur(ec.ecart)}</td>
                <td style={{textAlign:'right',color,fontWeight:'bold'}}>{Math.round(ec.ecartPct*10)/10}%</td>
                <td>{Math.abs(ec.ecartPct)>10?'⚠️ Écart':'✓'}</td>
              </tr>);
            })}
          </tbody>
        </table></div>
      </div>
    </div>}
  </div>);
}

const PeriodContext=React.createContext();
function usePeriod(){return React.useContext(PeriodContext);}

// Shared Pennylane invoice context — single fetch for all pages
const InvoiceContext=React.createContext({invoices:[],loading:false});
function useInvoices(){return React.useContext(InvoiceContext);}
function InvoiceProvider({children}){
  const[invoices,setInvoices]=useState([]);
  const[loading,setLoading]=useState(false);
  const[loaded,setLoaded]=useState(false);
  // Filtre côté client : ne garder que les factures depuis nov 2025 (commandes avant ouverture)
  var INVOICE_DATE_FROM='2025-11-01';
  function filterByDate(invs){
    return invs.filter(function(inv){return!inv.date||inv.date>=INVOICE_DATE_FROM;});
  }
  useEffect(()=>{
    if(PennylaneService.getToken()&&!loaded){
      setLoading(true);
      PennylaneService.getAllSupplierInvoices({maxPages:50,onRefresh:function(fresh){setInvoices(filterByDate(fresh));}})
        .then(function(inv){setInvoices(filterByDate(inv));setLoaded(true);})
        .finally(function(){setLoading(false);});
    }
  },[loaded]);
  const value=useMemo(function(){return{invoices:invoices,loading:loading,loaded:loaded};},[invoices,loading,loaded]);
  return React.createElement(InvoiceContext.Provider,{value:value},children);
}

// Helper: parse dd/mm/yyyy → Date
const parseDDMMYYYY=(s)=>{const p=s.split('/');return new Date(parseInt(p[2]),parseInt(p[1])-1,parseInt(p[0]));};
const toDDMMYYYY=(d)=>String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear();

function PeriodProvider({children}){
  const[mode,setMode]=useState('annee');
  const[customFrom,setCustomFrom]=useState('');
  const[customTo,setCustomTo]=useState('');
  const S=typeof TRIVEC_SEASON!=='undefined'?TRIVEC_SEASON:null;

  const dates=useMemo(()=>{
    const today=new Date();today.setHours(23,59,59,999);
    const todayStart=new Date();todayStart.setHours(0,0,0,0);
    if(mode==='jour')return{from:todayStart,to:today,label:"Aujourd'hui",days:1};
    if(mode==='semaine'){const f=new Date();f.setDate(f.getDate()-6);f.setHours(0,0,0,0);return{from:f,to:today,label:'7 derniers jours',days:7};}
    if(mode==='mois'){const f=new Date();f.setDate(f.getDate()-29);f.setHours(0,0,0,0);return{from:f,to:today,label:'30 derniers jours',days:30};}
    if(mode==='annee'){
      var nDays=S&&S.monthly?S.monthly.reduce(function(s,m){
        var fd=m.from.split('/');var td=m.to.split('/');
        var d1=new Date(fd[2],fd[1]-1,fd[0]);var d2=new Date(td[2],td[1]-1,td[0]);
        return s+Math.round((d2-d1)/86400000)+1;
      },0):90;
      return{from:new Date(2025,11,1),to:today,label:'Saison '+((S&&S.periode)?S.periode.label:''),days:nDays};
    }
    if(mode==='custom'&&customFrom&&customTo){const f=new Date(customFrom);f.setHours(0,0,0,0);const t=new Date(customTo);t.setHours(23,59,59);const diffDays=Math.max(Math.round((t-f)/86400000)+1,1);return{from:f,to:t,label:`${toDDMMYYYY(f)} → ${toDDMMYYYY(t)}`,days:diffDays};}
    return{from:todayStart,to:today,label:'—',days:1};
  },[mode,customFrom,customTo]);

  // Build trivecPeriod — centralise la logique saison vs daily
  const trivecPeriod=useMemo(()=>{
    var empty={total:0,days:0,caResto:0,caClub:0,caBar:0,couverts:0,especes:0,cb:0,amex:0,ticketMoyen:0,_fromSeason:false};

    // Helper: build from TRIVEC_SEASON
    // On utilise ventesBrut (inclut offerts/interne) pour les ratios — le coût matière
    // inclut ce qui est offert, donc le CA de référence doit aussi les inclure.
    function fromSeason(ss){
      // Catégories = Tot. Commandes (inclut offerts), on convertit en HT
      var cats=ss.categories||[];
      var nourTTC=(cats.find(function(c){return c.nom==='Nourriture';})||{}).montant||0;
      var alcTTC=(cats.find(function(c){return c.nom==='Boissons Alcoolisées';})||{}).montant||0;
      var saTTC=(cats.find(function(c){return c.nom==='Boissons Sans Alcool';})||{}).montant||0;
      var caFood=Math.round(nourTTC/1.10);
      var caDrinks=Math.round(alcTTC/1.20)+Math.round(saTTC/1.10);
      return{
        total:ss.ventesBrut,ventesNet:ss.ventesNet,days:ss.tickets>0?90:0,
        caResto:caFood,caClub:0,caBar:caDrinks,
        couverts:ss.couverts,especes:0,cb:0,amex:0,
        ticketMoyen:ss.couverts>0?Math.round(caFood/ss.couverts):0,
        _fromSeason:true
      };
    }

    // Helper: build from monthly array
    function fromMonthly(months){
      var t=0,cR=0,cB=0,cov=0;
      months.forEach(function(m){
        t+=m.ventesBrut||m.ventesNet;
        // Si le mois a des catégories, utiliser celles-ci (inclut offerts)
        if(m.categories){
          var nour=(m.categories.find(function(c){return c.nom==='Nourriture';})||{}).montant||0;
          var alc=(m.categories.find(function(c){return c.nom==='Boissons Alcoolisées';})||{}).montant||0;
          var sa=(m.categories.find(function(c){return c.nom==='Boissons Sans Alcool';})||{}).montant||0;
          cR+=Math.round(nour/1.10);
          cB+=Math.round(alc/1.20)+Math.round(sa/1.10);
        }else{
          // Fallback sur TVA (= Ventes Net, sans offerts)
          cR+=m.tva.taux10.ht;cB+=m.tva.taux20.ht;
        }
        cov+=m.couverts;
      });
      var nDays=months.reduce(function(s,m){
        var fd=m.from.split('/');var td=m.to.split('/');
        var d1=new Date(fd[2],fd[1]-1,fd[0]);var d2=new Date(td[2],td[1]-1,td[0]);
        return s+Math.round((d2-d1)/86400000)+1;
      },0);
      return{total:t,days:nDays,caResto:cR,caClub:0,caBar:cB,couverts:cov,especes:0,cb:0,amex:0,ticketMoyen:cov>0?Math.round(cR/cov):0,_fromSeason:true};
    }

    // Helper: build from daily Trivec data
    function fromDaily(){
      var allDays=TrivecService.getAllDays();
      var total=0,count=0,caResto=0,caClub=0,caBar=0,couverts=0,especes=0,cb=0,amex=0;
      for(var dateStr in allDays){
        if(!allDays.hasOwnProperty(dateStr))continue;
        var dt=parseDDMMYYYY(dateStr);var data=allDays[dateStr];
        if(dt>=dates.from&&dt<=dates.to){
          total+=data.ventes?.total||0;caResto+=data.ventes?.restaurant||0;
          caClub+=data.ventes?.club||0;caBar+=data.ventes?.bar||0;
          couverts+=(data.couverts?.restaurant?.total||0);
          especes+=data.paiements?.especes||0;cb+=data.paiements?.cb||0;amex+=data.paiements?.amex||0;
          count++;
        }
      }
      return{total:total,days:count,caResto:caResto,caClub:caClub,caBar:caBar,couverts:couverts,especes:especes,cb:cb,amex:amex,ticketMoyen:couverts>0?caResto/couverts:0,_fromSeason:false};
    }

    // --- Mode Année / Saison → toujours TRIVEC_SEASON ---
    if(mode==='annee'&&S){return fromSeason(S);}

    // --- Mode Mois → utiliser TRIVEC_SEASON.monthly si disponible ---
    if(mode==='mois'&&S&&S.monthly){
      // Trouver le(s) mois qui chevauchent la période (30 derniers jours)
      var matchMonths=S.monthly.filter(function(m){
        var fd=m.from.split('/');var td=m.to.split('/');
        var mFrom=new Date(fd[2],fd[1]-1,fd[0]);var mTo=new Date(td[2],td[1]-1,td[0]);
        return mTo>=dates.from&&mFrom<=dates.to;
      });
      if(matchMonths.length>0)return fromMonthly(matchMonths);
    }

    // --- Mode Semaine → essayer daily data, sinon prorata du dernier mois ---
    if(mode==='semaine'){
      var daily=fromDaily();
      if(daily.days>=4)return daily; // Au moins 4 jours sur 7
      // Fallback : prorata du dernier mois disponible
      if(S&&S.monthly){
        var lastMonth=S.monthly[S.monthly.length-1];
        var fd2=lastMonth.from.split('/');var td2=lastMonth.to.split('/');
        var d1=new Date(fd2[2],fd2[1]-1,fd2[0]);var d2=new Date(td2[2],td2[1]-1,td2[0]);
        var mDays=Math.round((d2-d1)/86400000)+1;
        var ratio=7/mDays;
        return{
          total:Math.round(lastMonth.ventesNet*ratio),days:7,
          caResto:Math.round(lastMonth.tva.taux10.ht*ratio),caClub:0,
          caBar:Math.round(lastMonth.tva.taux20.ht*ratio),
          couverts:Math.round(lastMonth.couverts*ratio),
          especes:0,cb:0,amex:0,
          ticketMoyen:lastMonth.couverts>0?Math.round(lastMonth.tva.taux10.ht/lastMonth.couverts):0,
          _fromSeason:true
        };
      }
      return daily;
    }

    // --- Mode Jour → daily data only, pas de fallback saison ---
    if(mode==='jour'){return fromDaily();}

    // --- Custom / Fallback → daily data ---
    return fromDaily();
  },[dates,mode]);

  // Masse salariale prorata
  const msActive=PayrollService.getMasseSalarialeActive();
  const msMensuel=PayrollService.getMasseSalarialeMensuelle();
  const msProrata=Math.round(msMensuel/30*dates.days);

  const value={mode,setMode,customFrom,setCustomFrom,customTo,setCustomTo,dates,trivecPeriod,msActive,msMensuel,msProrata};
  return React.createElement(PeriodContext.Provider,{value},children);
}

          <span>Dashboard</span>
        </div>
        <nav className="sidebar-nav">
          {nav.map(s=>(
            <div className="nav-sec" key={s.sec}>
              <div className="nav-sec-title" onClick={()=>toggleSec(s.sec)}>{s.sec}<span className={`chevron${openSecs[s.sec]?' open':''}`}>&#9654;</span></div>
              <div className={`nav-sec-items${openSecs[s.sec]?' open':''}`}>
                {s.items.map(it=>(
                  <div key={it.id} className={`nav-item ${page===it.id?'active':''}`} onClick={()=>{setPage(it.id);setSidebarOpen(false);}}>
                    {it.ic}{it.l}
                  </div>
                ))}
              </div>
            </div>
          ))}
        </nav>
        <div className="sidebar-foot" style={{cursor:'pointer'}} onClick={handleLogout} title="Se déconnecter">
          <div className="avatar">{currentUser.nom?currentUser.nom.split(' ').map(w=>w[0]).join(''):'?'}</div>
          <div style={{flex:1}}><div className="uname">{currentUser.nom}</div><div className="urole">{currentUser.role}</div></div>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.5)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </div>
      </aside>
      <main className="main">
        <header className="header">
          <div className="header-l"><button className="burger" onClick={()=>setSidebarOpen(!sidebarOpen)}>&#9776;</button><h2>{titles[page]}</h2><span className="bc">{pCtx.dates.label}</span></div>
          <div className="header-r">
            <div className="per">
              {[{k:'jour',l:'Jour'},{k:'semaine',l:'Semaine'},{k:'mois',l:'Mois'},{k:'annee',l:'Année'},{k:'custom',l:'Période'}].map(p=>(
                <button key={p.k} className={`per-btn ${pCtx.mode===p.k?'active':''}`} onClick={()=>pCtx.setMode(p.k)}>{p.l}</button>
              ))}
            </div>
            {pCtx.mode==='custom'&&<div style={{display:'flex',gap:4,alignItems:'center'}}>
              <input type="date" value={pCtx.customFrom} onChange={e=>pCtx.setCustomFrom(e.target.value)} style={{padding:'3px 6px',border:'1px solid var(--gris-200)',borderRadius:6,fontSize:11,background:'white'}}/>
              <span style={{fontSize:11,color:'var(--gris-400)'}}>→</span>
              <input type="date" value={pCtx.customTo} onChange={e=>pCtx.setCustomTo(e.target.value)} style={{padding:'3px 6px',border:'1px solid var(--gris-200)',borderRadius:6,fontSize:11,background:'white'}}/>
            </div>}
            <div className="loc"><I.Pin/><div className="loc-dot"/>Val d'Isère<I.Chev/></div>
            <div className="notif"><I.Bell/></div>
          </div>
        </header>
        <div className="page"><P/></div>
      </main>
    </div>
  );
}

// App wrapper with PeriodProvider
function App(){return <PeriodProvider><InvoiceProvider><AppInner/></InvoiceProvider></PeriodProvider>;}

// ErrorBoundary to prevent blank pages on crash
class ErrorBoundary extends React.Component{
  constructor(props){super(props);this.state={hasError:false,error:null};}
  static getDerivedStateFromError(error){return{hasError:true,error};}
  componentDidCatch(error,info){console.error('[IMA Dashboard Error]',error,info);}
  render(){
    if(this.state.hasError){
      return React.createElement('div',{style:{padding:40,textAlign:'center',fontFamily:'Inter,system-ui,sans-serif'}},
        React.createElement('div',{style:{fontSize:24,fontWeight:700,color:'#B91C1C',marginBottom:12}},'Erreur'),
        React.createElement('div',{style:{fontSize:14,color:'#6B7280',marginBottom:8}},this.state.error?.message||'Une erreur est survenue'),
        React.createElement('div',{style:{fontSize:12,color:'#9CA3AF',marginBottom:20}},'Vérifiez la console (F12) pour plus de détails'),
        React.createElement('button',{onClick:()=>this.setState({hasError:false,error:null}),style:{padding:'8px 20px',background:'#581527',color:'white',border:'none',borderRadius:8,cursor:'pointer',fontSize:13}},'Réessayer'),
        React.createElement('button',{onClick:()=>window.location.reload(),style:{padding:'8px 20px',background:'#E5E7EB',color:'#374151',border:'none',borderRadius:8,cursor:'pointer',fontSize:13,marginLeft:8}},'Recharger la page')
      );
    }
    return this.props.children;
  }
}

ReactDOM.render(<ErrorBoundary><App/></ErrorBoundary>,document.getElementById('root'));
</script>
